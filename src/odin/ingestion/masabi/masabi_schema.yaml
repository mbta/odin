          format: GENERIC_STRING
          example: 1ff08290-32ca-48c2-8ae9-0d6f40a41612
        consequenceType:
          type: string
          description: "The type of consequence that was generated/handled<br /><br\
            \ />ExpectedValues:<br />Block: Attempt to automatically block this ACCOUNT,\
            \ APP or DEVICE.<br />SuspendPayments: Prevents payments from being executed\
            \ by this ACCOUNT or APP for a given period.<br />NoOperation: Do nothing."
          format: GENERIC_STRING
          example: BLOCK
        dispatchResult:
          type: string
          description: "The outcome of the consequence<br /><br />ExpectedValues:<br\
            \ />SUCCEEDED: The consequence dispatch was successful and the action\
            \ has been completed.<br />FAILED: The consequence dispatch failed, the\
            \ action may not have been completed.<br />NOT_ATTEMPTED: consequenceType\
            \ was 'NoOperation' so no dispatch was attempted.<br />SUPPRESSED: consequenceType\
            \ was not 'NoOperation', but this actor has been added to the Pattern\
            \ allow-list and is exempt."
          format: GENERIC_STRING
          example: SUCCEEDED
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        category:
          type: string
          description: "The higher level grouping that this signal detector operates\
