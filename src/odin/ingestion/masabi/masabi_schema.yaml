    abt.token_events:
      type: object
      properties:
        actions:
          type: array
          items:
            type: string
            description: "Describes token update actions<br /><br />ExpectedValues:<br\
              \ />MAKE_ACTIVE: Make token active<br />MAKE_BLOCKED: Make token blocked<br\
              \ />SET_ICN: Set the ICN<br />SET_UID: Set the UID<br />UPDATE_CARD_NAME:\
              \ Update card name<br />IS_HEALTHY: Set the health status to HEALTHY<br\
              \ />IS_LOW_BALANCE: Set the health status to LOW_BALANCE<br />IS_INSUFFICIENT_FUNDS:\
              \ Set the health status to INSUFFICIENT_FUNDS<br />SET_PARTNER: Set\
              \ the partner<br />SET_ACCOUNT: Set the account<br />UPDATE_ENTITLEMENTS:\
              \ Update entitlements<br />UPDATE_PASSES: Update passes<br />CREATED:\
              \ Token created<br />DELETE_ACCOUNT: Delete the account<br />UPDATE_HIERARCHY:\
              \ Update the token hierarchy<br />UPDATE_USABILITY: Update the token\
              \ usability<br />UPDATE_IDENTIFIER: Update a token identifier"
            format: GENERIC_STRING
            example: "[\"CREATED\",\"UPDATE_PASSES\"]"
        behaviour:
          type: string
          description: "Determines the behavioural rules for each token type<br /><br\
            \ />ExpectedValues:<br />STANDARD_TAP_AND_RIDE: Regular pay as you tap\
            \ token behaviour<br />PERMIT_TO_TRAVEL: Token has been issued a pass\
            \ for unlimited travel during a set time period<br />EMV: Payment card\
            \ (debit, credit, etc)<br />DISPOSABLE: A non durable smart card that\
            \ is preloaded with a pass/credit, and will be disposed of after use<br\
            \ />PARTNER_CARDS: Anonymous smart cards issued with a partner pass that\
            \ cannot be linked to an account"
          format: GENERIC_STRING
          example: PERMIT_TO_TRAVEL
        entitlements:
          type: array
          items:
            type: object
            properties:
              effectiveFrom:
                type: number
                description: Instant the entitlement is effective from
                format: EPOCH_MILLIS
                example: 1534941901348
              expiry:
                type: number
                description: Instant the entitlement expires at
                format: EPOCH_MILLIS
                example: 1534941901348
              name:
                type: string
                description: Agency supplied name for this restriction
                format: GENERIC_STRING
                example: CHILD
            description: Applicable Product Restrictions
        eventId:
          type: string
          description: Internal unique id of this event<br /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: c9ebdd9d-95b0-4d8d-866c-9c580bf78917
        externalTokenId:
