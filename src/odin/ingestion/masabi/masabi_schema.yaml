        actorType:
          type: string
          description: "The type of actor that this consequence was intended for<br\
            \ /><br />ExpectedValues:<br />USERNAME: Asset Management only: the username\
            \ currently logged into a validator.<br />TICKET: A ticket issued by Justride,\
            \ actorId equal to ticketId.<br />ACCOUNT: Full registered account, actorId\
            \ equal to accountId.<br />DEVICE: actorId equal to the OS-provided device\
            \ identifier, unique across OS installations.<br />APP: App Installation,\
            \ actorId equal to appId.<br />PAYMENT_CARD: Approximate signature of\
            \ a payment card. actorId is panFirstSix+panLastFour+zipCode.<br />USER:\
            \ actorId is either an accountId or appId, used in patterns where it cannot\
            \ be determined which.<br />BRAND: Internal only.<br />SVA: actorId equal\
            \ to svaId, a stored value account managed by Justride."
