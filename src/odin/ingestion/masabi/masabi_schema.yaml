              type: number
              description: Timestamp when avl-context updates are applied to validator
              format: EPOCH_MILLIS
              example: 1534941901348
            egressTimestamp:
              type: number
              description: Timestamp when avl-context updates are available for the
                validator to read
              format: EPOCH_MILLIS
              example: 1534941901348
            egressToDeviceLatency:
              type: number
              description: "[INTERNAL FIELD]<br />The latency between the avl-context\
                \ update being available for the validator and the validator applying\
                \ the update (in millis)"
              format: LONG
              example: 2328797917748
            feedTimestamp:
              type: number
              description: Timestamp when GTFS feed is updated by agency
              format: EPOCH_MILLIS
              example: 1534941901348
            feedToDeviceLatency:
              type: number
              description: "[INTERNAL FIELD]<br />The latency between the agency GTFS\
                \ feed update and the validator applying the update (in millis)"
              format: LONG
              example: 2328797917748
            feedToIngestLatency:
              type: number
              description: "[INTERNAL FIELD]<br />The latency between the agency GTFS\
                \ feed update and the backend reading it (in millis)"
              format: LONG
              example: 2328797917748
            ingestAge:
              type: number
              description: "[INTERNAL FIELD]<br />The age of the GTFS feed ingestion\
                \ timestamp relative to the validator's current time (in millis)"
              format: LONG
              example: 2328797917748
            ingestTimestamp:
              type: number
              description: Timestamp when GTFS feed is consumed by gtfs-poller
              format: EPOCH_MILLIS
              example: 1534941901348
            ingestToEgressLatency:
              type: number
              description: "[INTERNAL FIELD]<br />The latency between the backend\
                \ reading the GTFS feed and avl-context updates being available for\
                \ the validator to read (in millis)"
              format: LONG
              example: 2328797917748
          description: All telemetry data specific to the application which handles
            avl-context updates
        bootloader:
          type: object
          properties:
            version:
              type: string
              description: Version of u-boot that validator is running
              format: GENERIC_STRING
              example: 2022.07-rc5-00057-g73776a3f74
          description: All telemetry data specific to the bootloader
        brownout:
          type: boolean
          description: True when device brownout alarm has occurred
