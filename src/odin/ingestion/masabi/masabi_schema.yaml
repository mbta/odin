            description: Manufacturer ids of all ABT smart cards hat this customer
              has used.
            format: SEARCHABLE_GENERIC_ID
            example: man-630ade4c-98bc-41ca-a329-310aff2f999d
        username:
          type: string
          description: The email address used for the original account creation.
          format: SUB_SEARCHABLE_EMAIL_ADDRESS
          example: tom.godber@masabi.com
        verificationTimestamp:
          type: number
          description: "Timestamp when this account was verified, or null if the account\
            \ is unverified. <br /> WARNING! Field is not indexed (see below)"
          format: EPOCH_MILLIS
          example: 1534941901348
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        latestIngestTimestamp:
          type: number
          description: The ingestTimestamp value from the most recent event that updated
            this view<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
      description: Searchable up-to-date view of activity of customers with full registered
        accounts.
    view.ticket_wallet:
      type: object
      properties:
        accountId:
          type: string
          description: Masabi internal account ID (reversible to a user's email address)
          format: GENERIC_STRING
          example: AC2243SYQWN
        activationDurationMinutes:
          type: number
          description: The period of time in minutes for which the ticket will remain
            ACTIVE following an activation
          format: INTEGER
          example: 180
        activationIds:
          type: array
          items:
            type: string
            description: List of unique ids of activations of the ticket
            format: GENERIC_STRING
            example: "[89712, 90312]"
        activationWindowEnd:
          type: number
          description: "Date/time the latest ticket activation expires, as epoch milliseconds\
            \ <br /> WARNING! Field is not indexed (see below)"
          format: EPOCH_MILLIS
          example: 123489879233
        ancestorOwnerId:
          type: string
          description: AppId or AccountId associated with the ticket whose annulment
            resulted in the creation of this ticket
          format: GENERIC_STRING
          example: AC2243SYQWN
        ancestorTicketId:
          type: string
          description: Id of the ticket whose annulment resulted in the creation of
            this ticket
          format: GENERIC_STRING
          example: MT12343AC35
        appId:
          type: string
          description: Unique identifier for the installation of the application
          format: GENERIC_STRING
          example: AP23P3SYQWL
        channel:
          type: string
          description: The context in which this event was initiated
          format: GENERIC_STRING
          example: Mobile
        creationReason:
          type: string
          description: Explains why this ticket was created
          format: GENERIC_STRING
          example: PURCHASE
        currencyCode:
          type: string
          description: The currency this transaction was conducted in (ISO4217)
          format: GENERIC_STRING
          example: USD
        destination:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: Details on the destination station of this ticket
        effectivePurchaseTimestamp:
          type: number
          description: Typically equal to issuedTimestamp but Hub allows agents to
            issue ticket as if they were purchased in the future
          format: EPOCH_MILLIS
          example: 1534941901348
        expiryTimestamp:
          type: number
          description: "Latest date/time that the ticket can be activated, as epoch\
            \ milliseconds"
          format: EPOCH_MILLIS
          example: 1534941901348
        fulfilmentType:
          type: string
          description: "Indicates how the ticket was delivered to the customer (e.g.\
            \ MOBILE, PDF)"
          format: GENERIC_STRING
          example: PDF
        groupId:
          type: string
          description: Unique identifier for a group of tickets issued from a single
            purchased composite product
          format: GENERIC_STRING
          example: 5FVFO6PXAVEZJNTJTRY2ROXOYE
        issuedTimestamp:
          type: number
          description: "Date/time when the ticket was issued by retail server, as\
            \ epoch milliseconds"
          format: EPOCH_MILLIS
          example: 1534941901348
        latestActivationTimestamp:
          type: number
          description: "Latest date/time the ticket was activated, as epoch milliseconds"
          format: EPOCH_MILLIS
          example: 1534941901348
        latestAnnulment:
          type: object
          properties:
            latestUpdateTimestamp:
              type: number
              description: The timestamp of the most recent annulment of this ticket.
                <br /> WARNING! Field is not indexed (see below)
              format: EPOCH_MILLIS
              example: 1534941901348
            reason:
              type: string
              description: The reason that this ticket was annulled.
              format: GENERIC_STRING
              example: MIGRATED
          description: "A ticket can be annulled more than once (cancelled and then\
            \ reactivated, for example). This object tracks the last seen one."
        latestScanTimestamp:
          type: number
          description: "Latest date/time the ticket was scanned, as epoch milliseconds"
          format: EPOCH_MILLIS
          example: 1534941901348
        maxActivations:
          type: number
          description: "Number of activations, or -1 if a period pass (ie. unlimited)"
          format: BYTE
          example: 3
        maxNumberOfUses:
          type: number
          description: "Number of uses, or -1 if a period pass (ie. unlimited)"
          format: BYTE
          example: 2
        migratedActivationsCount:
          type: number
          description: The number of activations that have already happened on the
            ticket whose annulment resulted in the creation of this ticket
          format: SHORT
          example: 32767
        multiLegJourneyId:
          type: string
          description: "For multi leg journeys, the multiLegJourneyId is associated\
            \ with all tickets that are part of the same journey"
          format: GENERIC_STRING
          example: 5aaz515d-9a70-4a3f-9d54-96c0385416k1
        nextTransferAgencyId:
          type: string
          description: "For tickets part of a multi leg journey, it identifies the\
            \ agency used in the next leg (could be a Justride brand ID or another\
            \ non-JustRide agency ID)"
          format: GENERIC_STRING
          example: MTA-LIRR
        origin:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: Details on the origin station of this ticket
        partner:
          type: string
          description: ID of the partner that the ticket was issued on behalf of
          format: GENERIC_STRING
          example: UCL
        previousTransferAgencyId:
          type: string
          description: "For tickets part of a multi leg journey, it identifies the\
            \ agency used in the previous leg (could be a Justride brand ID or another\
            \ non-JustRide agency ID)"
          format: GENERIC_STRING
          example: AgencyA
        priceIfBoughtAlone:
          type: number
          description: "The cost of this ticket, had it been purchased individually\
            \ (rather than as part of a composite)"
          format: MONEY
          example: 15.5
        productFareType:
          type: string
          description: "The fare type of the product selected at the time of purchase,\
            \ as defined in the tariff"
          format: GENERIC_STRING
          example: Round Trip
        productName:
          type: string
          description: The name of the product selected at the time of purchase -
            with composite tickets this may be different from the issued ticket name
          format: GENERIC_STRING
          example: Peak / Off Peak
        productPrice:
          type: number
          description: "Price of this product; if this is a complimentary ticket issued\
            \ by Hub (channel=CustomerService), this will be the price the user would\
            \ have paid if they had bought it."
          format: MONEY
          example: 2398.83
        purchaseId:
          type: string
          description: Masabi-generated ID for the purchase event associated with
            this ticket
          format: GENERIC_STRING
          example: PUOGHTET2MQ7U2Y
        scanIds:
          type: array
          items:
            type: string
            description: List of unique ids of all scans associated with the ticket
              (including scans that have been voided)
            format: GENERIC_STRING
            example: "[89712, 90312]"
        startTimestamp:
          type: number
          description: "Earliest date/time that the ticket can be activated, as epoch\
            \ milliseconds"
          format: EPOCH_MILLIS
          example: 1534941901348
        state:
          type: string
          description: "Reflects how this ticket can be used (if at all), based on\
            \ the passage of time and previous activations.<br /><br />ExpectedValues:<br\
            \ />INACTIVE_BEFORE_VP: The current time is before the validity period\
            \ of the ticket. The ticket cannot be used.<br />INACTIVE: The ticket\
            \ is within validity period and has never been activated/scanned.<br />ACTIVE:\
            \ The ticket is within validity period and has at least one activation\
            \ or has been scanned at least once.<br />USED: The ticket has been activated/scanned\
            \ the maximum number of times allowed for this ticket.<br />EXPIRED: The\
            \ ticket has expired.<br />MIGRATED: The ticket has been migrated to another\
            \ account and cannot be used.<br />DELETED: The ticket has been deleted\
            \ and replaced by a new ticket (with a different ticketId), either due\
            \ to a device switch or a reactivation.<br />REFUNDED: The ticket was\
            \ annulled due to the associated purchase being refunded.<br />CANCELLED:\
            \ The ticket was annulled manually for some other reason (check latestAnnulment.reason\
            \ for comment). <br /> WARNING! Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: EXPIRED
        successorOwnerId:
          type: string
          description: AppId or AccountId associated with the ticket that has been
            created as a result of this ticket annulment
          format: GENERIC_STRING
          example: AC2243SYQWN
        successorTicketId:
          type: string
          description: Id of the ticket that has been created as a result of this
            ticket annulment
          format: GENERIC_STRING
          example: MT12343AC35
        ticketFareType:
          type: string
          description: "The fare type of the product against which this ticket was\
            \ issued, as defined in the tariff"
          format: GENERIC_STRING
          example: One Way
        ticketId:
          type: string
          description: Unique identifier for this mTicket
          format: GENERIC_STRING
          example: MT12343AC35
        ticketName:
          type: string
          description: "A meaningful product name to an agency user, eg Child"
          format: GENERIC_STRING
          example: Peak
        ticketOffer:
          type: object
          properties:
            latestUpdateTimestamp:
              type: number
              description: Timestamp when the ticket offer was last updated or modified
                <br /> WARNING! Field is not indexed (see below)
              format: EPOCH_MILLIS
              example: 1534941901348
            offerStatus:
              type: string
              description: Status of the ticket offer
              format: GENERIC_STRING
              example: AbCdEfGhIjKlMnOpQrS
            ticketOfferId:
              type: string
              description: UUID identifier of the ticket offer
              format: GENERIC_STRING
              example: 0199bab6-2794-7f3a-92cd-0d22198e9b0b
            ticketOwner:
              type: string
              description: "Role of the ticket owner in the gifting flow: 'SENDER'\
                \ (offer initiator) or 'RECIPIENT' (offer receiver)"
              format: GENERIC_STRING
              example: AbCdEfGhIjKlMnOpQrS
          description: "The ticket offer details associated with this ticket, if any"
        uniqueActionCodes:
          type: array
          items:
            type: string
            description: All the unique action codes from all the scans for this ticket.
            format: GENERIC_STRING
            example: AbCdEfGhIjKlMnOpQrS
        validScansCount:
          type: number
          description: The number of times a ticket has been scanned minus the number
            of voided scans <br /> WARNING! Field is not indexed (see below)
          format: LONG
          example: 5
        voidedScanIds:
          type: array
          items:
            type: string
            description: List of unique ids of voided scans associated with the ticket
            format: GENERIC_STRING
            example: "[12354, 98746]"
        voidedScansCount:
          type: number
          description: Count of how many ticket scans have been voided <br /> WARNING!
            Field is not indexed (see below)
          format: LONG
          example: 1
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        latestIngestTimestamp:
          type: number
          description: The ingestTimestamp value from the most recent event that updated
            this view<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        ownerId:
          type: string
          description: "Either accountId, appId, tokenId or purchaseId depending on\
            \ ownerType"
          format: GENERIC_STRING
          example: ABC1234
        ownerType:
          type: string
          description: "Denotes whether the document is associated with a account,\
            \ guest account or token<br /><br />ExpectedValues:<br />ACCOUNT: Customer\
            \ with full registered account<br />GUEST_ACCOUNT: Customer who have not\
            \ created an explicit account with us (app ID only)<br />TOKEN: Token\
            \ un-linked to an account<br />VENDOR_SALE: Owner disconnected from accounts\
            \ or tokens"
          format: GENERIC_STRING
          example: "[ACCOUNT, GUEST_ACCOUNT, TOKEN, VENDOR_SALE]"
        subBrand:
          type: string
          description: (Optional) sub-brand in which the event was triggered.
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
      description: "Maintains a live view of the state of all retail tickets, combining\
        \ annulments, activations and scans."
    view.validators:
      type: object
      properties:
        latestTelemetryForHealthStatus:
          type: object
          properties:
            appUptimeSec:
              type: number
              description: Number of seconds since the Inspect process restarted
              format: LONG
              example: 2328797917748
            appVersion:
              type: string
              description: Version of Inspect app
              format: GENERIC_STRING
              example: 1.00.21
            detail:
              type: object
              description: "Telemetry details such as temperature, free memory etc.\
                \ This object is also flattened and the recommended way is to use\
                \ flattened properties directly. We need to keep json blob for legacy\
                \ assets/healthStatus API."
            deviceId:
              type: string
              description: Unique hardware ID of the device
              format: GENERIC_STRING
              example: DE55B42A-E58F-4271-9949-AA10A6C0FB7E
            deviceModel:
              type: string
              description: A description of the asset 'model' in a readable format
              format: GENERIC_STRING
              example: AbCdEfGhIjKlMnOpQrS
            deviceTimestamp:
              type: number
              description: Latest timestamp recorded on the local device clock <br
                /> WARNING! Field is not indexed (see below)
              format: EPOCH_MILLIS
              example: 1534941901348
            deviceType:
              type: string
              description: A number indicating the type of device.
              format: GENERIC_STRING
              example: "3"
            deviceUptimeSec:
              type: number
              description: Number of seconds since the device was restarted
              format: LONG
              example: 2328797917748
            event:
              type: string
              description: "Indicates the source of telemetry. 'heartbeat' is simulated\
                \ telemetry from TVD, 'deviceState' is real via IOT"
              format: GENERIC_STRING
              example: heartbeat
            fareBlocks:
              type: object
              description: Expanded fare block objects based on definitions in brand
                config
            faults:
              type: array
              items:
                type: string
                description: Current fault codes
                format: GENERIC_STRING
                example: AbCdEfGhIjKlMnOpQrS
            freeVmMemKb:
              type: number
              description: Free memory in the VM. Note that this may be small in normal
                operation
              format: LONG
              example: 2328797917748
            freeableMemKb:
              type: number
              description: Total available memory (including memory that Linux is
                currently using for caches)
              format: LONG
              example: 2328797917748
            latestUpdateTimestamp:
              type: number
              description: The timestamp that this device last emitted telemetry
              format: EPOCH_MILLIS
              example: 1534941901348
            location:
              type: object
              properties:
                lat:
                  type: number
                  example: 41.12
                lon:
                  type: number
                  example: -71.34
              description: The location of device at which the telemetry was sent
            nextStackVersion:
              type: string
              description: "The version of the stack (all apps, hardware/Linux configs)\
                \ downloaded but awaiting restart before installation on the device"
              format: GENERIC_STRING
              example: rocko-103
            serverTimestamp:
              type: number
              description: Timestamp recorded by the Masabi server at the point of
                stats message emission <br /> WARNING! Field is not indexed (see below)
              format: EPOCH_MILLIS
              example: 1534941901348
            stackVersion:
              type: string
              description: "The version of the stack (all apps, hardware/Linux configs)\
                \ running on the device"
              format: GENERIC_STRING
              example: rocko-103
          description: Reflects the latest metrics from the validator that can be
            used to calculate health status
        machineLoginUserLatestState:
          type: object
          properties:
            latestUpdateTimestamp:
              type: number
              description: The timestamp when the action occurred. <br /> WARNING!
                Field is not indexed (see below)
              format: EPOCH_MILLIS
              example: 1534941901348
            state:
              type: string
              description: "If someone has suspended or reactivated machine login\
                \ user, this field will reflect the final state.<br /><br />ExpectedValues:<br\
                \ />ACTIVE: Machine login user is active.<br />SUSPENDED: Machine\
                \ login user is suspended. <br /> WARNING! Field is not indexed (see\
                \ below)"
              format: GENERIC_STRING
              example: ACTIVE/SUSPENDED
          description: "Reflects the latest activate or suspend stat message observed\
            \ against a machine login user. If null, this means the machine login\
            \ user is ACTIVE."
        ownerId:
          type: string
          description: The username of the user logged in to the device
          format: GENERIC_STRING
          example: ATW3601603
        username:
          type: string
          description: The username of the user logged in to the device
          format: GENERIC_STRING
          example: ATW3601603
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        latestIngestTimestamp:
          type: number
          description: The ingestTimestamp value from the most recent event that updated
            this view<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        subBrand:
          type: string
          description: (Optional) sub-brand in which the event was triggered.
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
      description: Maintains a live view of the state of all validators based on telemetry
        data.
