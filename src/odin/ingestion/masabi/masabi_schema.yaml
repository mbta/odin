          example: 32767
        maxClockJumpSec:
          type: number
          description: Max clock jump in the period
          format: INTEGER
          example: 1232324
        netReqFailCount:
          type: number
          description: Number of network requests that failed in this period
          format: LONG
          example: 2328797917748
        netReqSuccessCount:
          type: number
          description: Total number of successful network requests in the period
          format: LONG
          example: 2328797917748
        netReqTotalCount:
          type: number
          description: Total number of network requests in the period
          format: LONG
          example: 2328797917748
        nextStackVersion:
          type: string
          description: "The version of the stack (all apps, hardware/Linux configs)\
            \ downloaded but awaiting restart before installation whilst this event\
            \ was sent"
          format: GENERIC_STRING
          example: rocko-103
        nfcReader:
          type: object
          properties:
            firmware:
              type: string
              description: The version of the firmware running on the NFC scanner
              format: GENERIC_STRING
              example: 26100A02-20042302
            sams:
              type: array
              items:
                type: object
                properties:
                  accessGranted:
                    type: boolean
                    description: Indicates if the SAM has been unlocked and host authentication
                      has succeeded
                    format: BOOLEAN
                    example: true
                  batchNumber:
                    type: string
                    description: Batch number programmed into this SAM
                    format: GENERIC_STRING
                    example: "9932600000"
                  keyTableHash:
                    type: string
                    description: "Prefix of this SAM's key table hash, which is calculated\
                      \ with public information of all its key entries"
                    format: GENERIC_STRING
                    example: a1b2c3
                  productionDate:
                    type: string
                    description: Date when this SAM was programmed
                    format: GENERIC_STRING
                    example: 19-08-01
                  slot:
                    type: number
                    description: The slot number this SAM is installed in
                    format: SHORT
                    example: 1
                  uid:
                    type: string
                    description: unique ID of this SAM
                    format: GENERIC_STRING
                    example: 04:2B:32:42:84:62:80
                description: A list of Secure Access Modules installed in the NFC
                  scanner (they have the keys to unlock smart cards and such)
            serialNumber:
              type: string
              description: The serial number of the NFC scanner
              format: GENERIC_STRING
              example: "0000001531000404"
            state:
              type: string
              description: "The current state of the reader<br /><br />ExpectedValues:<br\
                \ />OK: the NFC scanner is working correctly<br />TAMPERED: the NFC\
                \ scanner has detected a tamper state<br />READER_NOT_PRESENT: an\
                \ NFC scanner could not be detected<br />RTC_INVALID: the RTC reported\
                \ invalid values<br />SAM_NOT_PRESENT: a SAM was expected and not\
                \ found<br />INVALID_SAM: the SAM cannot be used with the current\
                \ configuration<br />MUTUAL_AUTH_KEY_NOT_PRESENT: the key needed to\
                \ start an encrypted session with the NFC scanner is missing<br />FAILED_MUTUAL_AUTH:\
                \ encrypted session with the NFC scanner could not be established<br\
                \ />UNKNOWN: the NFC scanner failed to initialise and it's current\
                \ state cannot be determined"
              format: GENERIC_STRING
              example: SAM_NOT_PRESENT
            tamperReasons:
              type: array
              items:
                type: string
                description: "A list of reasons why the NFC scanner has been marked\
                  \ as tampered<br /><br />ExpectedValues:<br />DEVICE_OPENED: the\
                  \ NFC scanner has been opened unexpectedly<br />TEMPERATURE_TOO_HIGH:\
                  \ the NFC scanner has been too hot<br />TEMPERATURE_TOO_LOW: the\
                  \ NFC scanner has been too cold<br />KEY_LOSS: the NFC scanner has\
                  \ lost its encryption keys<br />FIRMWARE_INTEGRITY: the NFC scanner\
                  \ cannot verify the currently install firmware<br />OTHER: the NFC\
                  \ scanner is tampered for something other than a tamper pin interrupt<br\
                  \ />UNKNOWN: the NFC scanner has detected an unknown tamper state"
                format: GENERIC_STRING
                example: "[DEVICE_OPENED, FIRMWARE_INTEGRITY]"
            temperature:
              type: number
              description: The temperature of the NFC scanner in degrees Celsius
              format: INTEGER
              example: 22
          description: Various details about the NFC scanner installed in the device
        operatorId:
          type: string
