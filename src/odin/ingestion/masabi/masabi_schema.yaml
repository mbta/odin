            \ a mobile barcode or smart card<br />SECONDARY: The main account holder\
            \ can add named secondary tokens - these can only be smart cards<br />NONE:\
            \ The hierarchy is not yet set"
          format: GENERIC_STRING
          example: PRIMARY
        tokenId:
          type: string
          description: The id of token used by the rider<br /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: APTA:JTNOSOBIQ7G
        tokenName:
          type: string
          description: "If the rider has given this token a custom name, it will be\
            \ populated here."
          format: GENERIC_STRING
          example: My Smartcard
        triggerId:
          type: string
          description: Id of the entity that triggered this event
          format: GENERIC_STRING
          example: JTNNI6DIQ7T
        triggerType:
          type: string
          description: Type of the entity that triggered this event
          format: GENERIC_STRING
          example: TICKET
        uid:
          type: string
          description: "Unique ID generated by the card manufacturer (MIfare, etc)\
            \ for this token"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: man-630ade4c-98bc-41ca-a329-310aff2f999d
      description: Tracks abt tap events
    abt.trip_events:
      type: object
      properties:
        chargeCurrencyCode:
          type: string
          description: Charge currency code
          format: GENERIC_STRING
          example: USD
        chargeDestination:
          type: string
          description: "Charge destination<br /><br />ExpectedValues:<br />EMV: EMV<br\
            \ />SVA: Stored value account"
          format: GENERIC_STRING
          example: EMV
        chargeType:
          type: string
          description: "Charge type<br /><br />ExpectedValues:<br />FARE_CHARGE: This\
            \ trip triggered a fare charge<br />UNCHARGEABLE: This trip was unchargeable<br\
            \ />FARE_CHARGE_CORRECTION: This trip triggered a correction to a previous\
            \ fare charge"
          format: GENERIC_STRING
          example: FARE_CHARGE
        chargeValue:
          type: number
          description: Amount rider was charged
          format: MONEY
          example: 5.25
        completeness:
          type: string
          description: "Describes completeness state of the trip<br /><br />ExpectedValues:<br\
            \ />COMPLETE: All expected taps are present<br />PARTIAL: Some of the\
            \ expected taps are present and the system is still awaiting for the remaining\
            \ tap(s)<br />INCOMPLETE: Some of the expected taps are present but the\
            \ system is not going to wait any longer for any remaining taps<br />CANCELLED:\
            \ Most recent tap has been cancelled by either rider or driver, system\
            \ treats associated trip as cancelled"
          format: GENERIC_STRING
          example: PARTIAL
        destination:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: The station/stop the trip ended at. Only applicable for A2B
            journeys
        distanceTravelled:
          type: number
          description: The distance travelled in this trip
          format: DISTANCE
          example: 10.66
        entitlementNames:
          type: array
          items:
            type: string
            description: Names of the Entitlement associated with the trip event
            format: GENERIC_STRING
            example: "[\"SENIOR\",\"DISABLED\"]"
        eventId:
          type: string
          description: Internal unique id of this event<br /><br />NotEmpty
          format: GENERIC_STRING
          example: a9e5dd9d-95b0-4d8d-866c-9c580bf78917
        fareBlocks:
          type: object
          properties:
            outcome:
              type: string
              description: "Travel outcome depending on configuration available in\
                \ brand config and ABT fare engine<br /><br />ExpectedValues:<br />NONE:\
                \ the brand is not configured to use fare blocks<br />HAS_FARE_BLOCKS:\
                \ the brand is configured with fare blocks and a list (can be empty)\
                \ was provided<br />UNKNOWN: the fare engine could not reconcile the\
                \ fare blocks in the tariff and the scan data"
              format: GENERIC_STRING
              example: HAS_FARE_BLOCKS
            trip:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of this fare block in the brand config definition
                    format: GENERIC_STRING
                    example: "4"
                  name:
                    type: string
                    description: The human readable description of this Fare block
                      in the brand config definition
                    format: GENERIC_STRING
                    example: Park-n-Ride
                description: "The set of fare blocks active when they are known (outcome\
                  \ == HAS_FARE_BLOCKS). Otherwise an empty set (outcome == NONE,\
                  \ outcome == UNKNOWN)."
          description: Describes the fare engine’s calculation of the fare blocks
        fareId:
          type: string
          description: The unique id of the fare associated with this trip
          format: GENERIC_STRING
          example: ea743cb0-29e8-4bcf-92a7-06d7b6c80c43
        farePartnerId:
          type: string
          description: The unique Id of the partner associated
          format: GENERIC_STRING
          example: enterprise-123
        farePartnerName:
          type: string
          description: A meaningful partner name
          format: GENERIC_STRING
          example: Enterprises LTD
        origin:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: The station/stop the trip started at
        outcome:
          type: string
          description: "Outcome of the trip happening, e.g. NEW_FARE, UPGRADE, ATTACHED_TO_EXISTING,\
            \ REJECTED_TOO_OLD, ORPHANED, CANCELLED<br /><br />ExpectedValues:<br\
            \ />NEW_FARE: This trip earned a new fare<br />UPGRADE: This trip earned\
            \ a fare upgrade<br />ATTACHED_TO_EXISTING: This trip was attached to\
            \ an existing fare<br />REJECTED_TOO_OLD: This trip was rejected as too\
            \ old to process<br />ORPHANED: There was no fare able to absorb this\
            \ trip<br />CANCELLED: The trip was cancelled"
          format: GENERIC_STRING
          example: ATTACHED_TO_EXISTING
        partner:
          type: string
          description: ID of the partner the user triggering this action is associated
            with
          format: GENERIC_CASE_SENSITIVE_STRING
          example: UCL
        productEnd:
          type: number
          description: The end/expiry timestamp of the first product to absorb the
            trip
          format: EPOCH_MILLIS
          example: 1534941901348
        productName:
          type: string
          description: "A meaningful product name to an agency user, eg Single Trip\
            \ or Round Trip"
          format: GENERIC_STRING
          example: Single Trip
        scanId:
          type: string
          description: The unique id of the scan associated with this trip
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ecc85cca-a383-4310-8ed7-197c09e4a8c9
        stationsInTaps:
          type: array
          items:
            type: object
            properties:
              externalId:
                type: string
                description: The agency ID for the station
                format: GENERIC_STRING
                example: GRN
              internalId:
                type: string
                description: The internal Masabi ID for the station
                format: GENERIC_CASE_SENSITIVE_STRING
                example: "744"
              lineIds:
                type: array
                items:
                  type: string
                  description: The line IDs for the station
                  format: GENERIC_STRING
                  example: "[ \"2\", \"6\" ]"
              name:
                type: string
                description: The name of the station
                format: GENERIC_STRING
                example: Green Hills
              zoneIds:
                type: array
                items:
                  type: string
                  description: Zone the station is in
                  format: GENERIC_STRING
                  example: "45"
            description: Stations in the taps of the trip
        status:
          type: string
          description: "Status of the journey<br /><br />NotEmpty<br /><br />ExpectedValues:<br\
            \ />COMPLETE: Trip was completed<br />OLD: Trip was too old to be processed"
          format: GENERIC_STRING
          example: COMPLETE
        svaId:
          type: string
          description: "The SVA id - tokenId for unlinked SVAs, accountId for linked\
            \ ones"
          format: GENERIC_STRING
          example: JC3IVS5YGOD
        taps:
          type: array
          items:
            type: object
            properties:
              direction:
                type: string
                description: The direction of the tap if present <br /> WARNING! Field
                  is not indexed (see below)
                format: GENERIC_STRING
                example: E
              fareBlocks:
                type: object
                properties:
                  outcome:
                    type: string
                    description: "Travel outcome depending on configuration available\
                      \ in brand config and ABT fare engine<br /><br />ExpectedValues:<br\
                      \ />NONE: the brand is not configured to use fare blocks<br\
                      \ />HAS_FARE_BLOCKS: the brand is configured with fare blocks\
                      \ and a list (can be empty) was provided<br />UNKNOWN: the fare\
                      \ engine could not reconcile the fare blocks in the tariff and\
                      \ the scan data <br /> WARNING! Field is not indexed (see below)"
                    format: GENERIC_STRING
                    example: HAS_FARE_BLOCKS
                  tap:
                    type: array
                    items:
                      type: string
                      description: The ID of this fare block in the brand config definition
                        <br /> WARNING! Field is not indexed (see below)
                      format: GENERIC_STRING
                      example: "4"
                description: Describes the fare engine’s calculation of the fare blocks
              location:
                type: object
                properties:
                  lat:
                    type: number
                    example: 41.12
                  lon:
                    type: number
                    example: -71.34
                description: Latitude and longitude of the device the scan happened
                  on <br /> WARNING! Field is not indexed (see below)
              scanContext:
                type: object
                properties:
                  routeId:
                    type: string
                    description: Identifies the route the validator was on at the
                      time of the scan <br /> WARNING! Field is not indexed (see below)
                    format: GENERIC_STRING
                    example: "35840"
                  scannedAt:
                    type: string
                    description: "Internal ID of the station the travel media was\
                      \ scanned at, given by Masabi <br /> WARNING! Field is not indexed\
                      \ (see below)"
                    format: GENERIC_STRING
                    example: "9999"
                  scannedAtExternalId:
                    type: string
                    description: "External ID of the station the travel media was\
                      \ scanned at, given by the transit agency  <br /> WARNING! Field\
                      \ is not indexed (see below)"
                    format: GENERIC_STRING
                    example: "5739"
                  scannedAtName:
                    type: string
                    description: Name of the station the travel media was scanned
                      at <br /> WARNING! Field is not indexed (see below)
                    format: GENERIC_STRING
                    example: Chili Walmart
                  tripId:
                    type: string
                    description: "Identifies the trip the validator (and vehicle)\
                      \ was on at the time of the scan. Each trip has a unique tripId,\
                      \ and changes every time a vehicle starts/completes a route.\
                      \ <br /> WARNING! Field is not indexed (see below)"
                    format: GENERIC_STRING
                    example: "1080602"
                  vehicleId:
                    type: string
                    description: The ID of the vehicle that the validator was set
                      to at scan time <br /> WARNING! Field is not indexed (see below)
                    format: GENERIC_STRING
                    example: "1320"
                description: Describes additional scan data on each tap.
              source:
                type: string
                description: "Describes where the tap request is coming from<br /><br\
                  \ />ExpectedValues:<br />CUSTOMER_SERVICE_CORRECTION: a tap correction\
                  \ request made by customer service<br />RIDER_TRAVEL: a tap made\
                  \ by a rider after tapping on a validator"
                format: GENERIC_STRING
                example: RIDER_TRAVEL
              sourceScanId:
                type: string
                description: "The id of the scan triggering this event, if it came\
                  \ from a scan <br /> WARNING! Field is not indexed (see below)"
                format: GENERIC_CASE_SENSITIVE_STRING
                example: 2f13e674-e7ba-41cc-ad21-49d8241d6a56
              subBrand:
                type: string
                description: (Optional) sub-brand in which the event was triggered.
                  <br /> WARNING! Field is not indexed (see below)
                format: GENERIC_STRING
                example: AbCdEfGhIjKlMnOpQrS
              tapId:
                type: string
                description: The unique id of the event that trigger this tap<br /><br
                  />NotEmpty <br /> WARNING! Field is not indexed (see below)
                format: GENERIC_STRING
                example: fbb2feca-78a1-4d36-a59c-626ee951009f
              tapTime:
                type: number
                description: The time the tap happened in epoch millis<br /><br />NotEmpty
                  <br /> WARNING! Field is not indexed (see below)
                format: EPOCH_MILLIS
                example: 1549643726000
              travelStructure:
                type: string
                description: "Describes the type of the travel structure for a trip<br\
                  \ /><br />ExpectedValues:<br />FLAT: A trip is described by a single\
                  \ tap<br />DISTANCE_BASED: A trip is described by multiple taps<br\
                  \ />ASSISTED_DISTANCE_BASED: A trip is described by multiple taps\
                  \ that originated from a single scan <br /> WARNING! Field is not\
                  \ indexed (see below)"
                format: GENERIC_STRING
                example: FLAT
            description: Taps that constitute this trip
        transportModes:
          type: array
          items:
            type: string
            description: Transport mode(s) the trip occurred on
            format: GENERIC_STRING
            example: "[\"BUS\",\"TRAIN\"]"
        travelStructure:
          type: string
          description: "Describes the type of the travel structure for a trip<br /><br\
            \ />ExpectedValues:<br />FLAT: A trip is described by a single tap<br\
            \ />DISTANCE_BASED: A trip is described by multiple taps<br />ASSISTED_DISTANCE_BASED:\
            \ A trip is described by multiple taps that originated from a single scan"
          format: GENERIC_STRING
          example: FLAT
        tripAdjusted:
          type: boolean
          description: Identifies if the trip is adjusted
          format: BOOLEAN
          example: true
        tripCorrected:
          type: boolean
          description: Identifies if the trip is corrected
          format: BOOLEAN
          example: true
        tripEnd:
          type: number
          description: The time the trip ended in epoch millis. Only applicable for
            A2B journeys
          format: EPOCH_MILLIS
          example: 1549971249000
        tripId:
          type: string
          description: The unique id of this trip<br /><br />NotEmpty
          format: GENERIC_STRING
          example: ecc85cca-a383-4310-8ed7-197c09e4a8c9
        tripStart:
          type: number
          description: The time the trip started in epoch millis
          format: EPOCH_MILLIS
          example: 1549971245000
        accountId:
          type: string
          description: "Id of the account this token is bound to, if present"
          format: GENERIC_STRING
          example: JC3ITC5YGO7
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        dayOfWeek:
          type: string
          description: "The human readable day of week (MONDAY, TUESDAY, etc). Values\
            \ for this scripted field are affected by the 'timezone' parameter, with\
            \ each time value being adjusted before being assigned a day. <br /> WARNING!\
            \ Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: WEDNESDAY
        hourOfDay:
          type: number
          description: "The zero-indexed clock time hour (0-23). Values for this scripted\
            \ field are affected by the 'timezone' parameter, with each time value\
            \ being adjusted before being assigned an hour. <br /> WARNING! Field\
            \ is not indexed (see below)"
          format: INTEGER
          example: 3
        ingestTimestamp:
          type: number
          description: Timestamp recorded by the DS-Ingest node just before the insertion
            into data-store
          format: EPOCH_MILLIS
          example: 1534941901348
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        inventoryControlNumber:
          type: string
          description: "ID printed on the outside of card, in the case of physical\
            \ tokens"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: icn-2107cc99-9c6a-4a4d-a009-8f46aa9600b0
        localFareDate:
          type: string
          description: "The local date of the event, allowing for agency-specific\
            \ post-midnight cutoff times."
          format: LOCAL_DATE
          example: 2018-08-20
        mediaFormat:
          type: string
          description: "The name of the format of media<br /><br />ExpectedValues:<br\
            \ />SMARTCARD: A supported smart card (paper or plastic card with a readable\
            \ chip)<br />EMV: An EMV card (debit or credit card with a readable chip)<br\
            \ />BARCODE: A supported barcode (potentially displayed in the mobile\
            \ app)<br />OTHER: A format that is not one of the existing formats"
          format: GENERIC_STRING
          example: SMARTCARD
        mediaType:
          type: string
          description: "The id of the type of media e.g. 1, 100<br /><br />ExpectedValues:<br\
            \ />1: RSP6<br />2: FlexiTikt<br />3: MetroLink<br />7: Metrolink INIT<br\
            \ />5: RSP8<br />100: Aztec<br />101: Aztec RSP6<br />102: Aztec FlexiTikt<br\
            \ />103: Aztec Metrolink<br />107: Aztec Metrolink INIT<br />105: Aztec\
            \ RSP8<br />200: QRCode<br />201: QRCode RSP6<br />202: QRCode FlexiTikt<br\
            \ />203: QRCode Metrolink<br />207: QRCode Metrolink INIT<br />205: QRCode\
            \ RSP8<br />300: External App<br />301: External App RSP6<br />302: External\
            \ App FlexiTikt<br />303: External App Metrolink<br />307: External App\
            \ Metrolink INIT<br />305: External App RSP8<br />1300: External App ITSO<br\
            \ />1000: Contactless Card Generic<br />1100: MIFARE Card Generic<br />1101:\
            \ MIFARE Classic 1K<br />1102: MIFARE Classic 4K<br />1103: MIFARE DESFire\
            \ EV1<br />1104: MIFARE DESFire EV2<br />1106: MIFARE DESFire EV3<br />1105:\
            \ MIFARE Ultralight<br />2000: Contactless EMV Card Generic<br />2110:\
            \ Contactless Mastercard with Unknown form factor<br />2120: Contactless\
            \ Visa with Unknown form factor<br />2111: Mastercard Contactless Plastic\
            \ Card<br />2121: Visa Contactless Plastic Card<br />2112: Mastercard\
            \ Virtual Card- Mobile<br />2122: Visa Virtual Card- Mobile<br />2113:\
            \ Mastercard Virtual Card- Wearable<br />2123: Visa Virtual Card- Wearable<br\
            \ />2130: Contactless American Express with Unknown form factor<br />2131:\
            \ American Express Contactless Plastic Card<br />2132: American Express\
