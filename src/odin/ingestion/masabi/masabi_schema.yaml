            \ App FlexiTikt<br />External App Metrolink<br />External App Metrolink\
            \ INIT<br />External App RSP8<br />External App ITSO<br />Contactless\
            \ Card Generic<br />MIFARE Card Generic<br />MIFARE Classic 1K<br />MIFARE\
            \ Classic 4K<br />MIFARE DESFire EV1<br />MIFARE DESFire EV2<br />MIFARE\
            \ DESFire EV3<br />MIFARE Ultralight<br />Contactless EMV Card Generic<br\
            \ />Contactless Mastercard with Unknown form factor<br />Contactless Visa\
            \ with Unknown form factor<br />Mastercard Contactless Plastic Card<br\
            \ />Visa Contactless Plastic Card<br />Mastercard Virtual Card- Mobile<br\
            \ />Visa Virtual Card- Mobile<br />Mastercard Virtual Card- Wearable<br\
            \ />Visa Virtual Card- Wearable<br />Contactless American Express with\
            \ Unknown form factor<br />American Express Contactless Plastic Card<br\
            \ />American Express Virtual Card- Mobile<br />American Express Virtual\
            \ Card- Wearable<br />ISO 15693 Card Generic<br />UNKNOWN"
          format: GENERIC_STRING
          example: Barcode
        ownerId:
          type: string
          description: "Either accountId, appId, tokenId or purchaseId depending on\
            \ ownerType"
          format: GENERIC_STRING
          example: ABC1234
        ownerType:
          type: string
          description: "Denotes whether the document is associated with a account,\
            \ guest account or token<br /><br />ExpectedValues:<br />ACCOUNT: Customer\
            \ with full registered account<br />GUEST_ACCOUNT: Customer who have not\
            \ created an explicit account with us (app ID only)<br />TOKEN: Token\
            \ un-linked to an account<br />VENDOR_SALE: Owner disconnected from accounts\
            \ or tokens"
          format: GENERIC_STRING
          example: "[ACCOUNT, GUEST_ACCOUNT, TOKEN, VENDOR_SALE]"
        reason:
          type: string
