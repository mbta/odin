openapi: 3.0.1
info:
  title: Data Dictionary
  version: 1348.16.0
components:
  schemas:
    retail.account_actions:
      type: object
      properties:
        action:
          type: string
          description: The action that was attempted for the account
          format: GENERIC_STRING
          example: Login
        allocatedAccountId:
          type: string
          description: "Account ID assigned to the user, on ACCOUNT_CREATION"
          format: GENERIC_STRING
          example: AC2243SYQWN
        allocatedAppId:
          type: string
          description: "AppID assigned to the user's device, on DEVICE_LOGIN"
          format: GENERIC_STRING
          example: AP23P3SYQWL
        comment:
          type: string
          description: Optional comment related to this account action
          format: GENERIC_STRING
          example: Device reset granted by support
        email:
          type: string
          description: "If the action is EMAIL_ADDRESS_CHANGED, this will be the new\
            \ email address"
          format: GENERIC_STRING
          example: bob@gmail.com
        entitlementProofId:
          type: string
          description: Proof Id associated with the Entitlement
          format: GENERIC_CASE_SENSITIVE_STRING
          example: "123456789"
        entitlementRestrictionName:
          type: string
          description: Name of the Product Restriction associated with the Entitlement
          format: GENERIC_STRING
          example: REDUCED PASS
        errorCode:
          type: string
          description: "Error code, if this action attempt ended in failure; if null,\
            \ this was a successful action"
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        errorReason:
          type: string
          description: Human readable short description; null if action was successful
          format: GENERIC_STRING
          example: FAILED_ACCOUNT_ASSIGNED_TO_ANOTHER_DEVICE
        extraDeviceChanges:
          type: number
          description: "Number of device changes assigned to the account, on ACCOUNT_DEVICE_CHANGE"
          format: SHORT
          example: 32767
        firstName:
          type: string
          description: The given name of the user
          format: GENERIC_STRING
          example: John
        inventoryControlNumber:
          type: string
          description: "ID printed on the outside of card, in the case of physical\
            \ tokens"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: icn-2107cc99-9c6a-4a4d-a009-8f46aa9600b0
        lastName:
          type: string
          description: The family name or surname of the user.
          format: GENERIC_STRING
          example: Doe
        mediaFormat:
          type: string
          description: "The name of the format of media<br /><br />ExpectedValues:<br\
            \ />SMARTCARD: A supported smart card (paper or plastic card with a readable\
            \ chip)<br />EMV: An EMV card (debit or credit card with a readable chip)<br\
            \ />BARCODE: A supported barcode (potentially displayed in the mobile\
            \ app)<br />OTHER: A format that is not one of the existing formats"
          format: GENERIC_STRING
          example: SMARTCARD
        origAppId:
          type: string
          description: "Original appID of the device, on ACCOUNT_DEVICE_CHANGE"
          format: GENERIC_STRING
          example: AP23P3SYQWL
        phoneNumber:
          type: string
          description: A numeric string representing the user's telephone number.
          format: GENERIC_STRING
          example: "+447911123456"
        tokenId:
          type: string
          description: Token Id associated with the Entitlement
          format: GENERIC_CASE_SENSITIVE_STRING
          example: APTA:JTNOSOBIQ7G
        tokenName:
          type: string
          description: "If the rider has given this token a custom name, it will be\
            \ populated here."
          format: GENERIC_STRING
          example: My Smartcard
        usedDeviceChangeCredit:
          type: boolean
          description: Set to true when user has active tickets during device change
            action
          format: BOOLEAN
          example: true
        username:
          type: string
          description: "Username of the user involved in this event, usually an email\
            \ address"
          format: GENERIC_STRING
          example: justin.ride@masabi.com
        verificationCode:
          type: string
          description: The verification code of the smartcard during token association
          format: GENERIC_STRING
          example: "013"
        accountId:
          type: string
          description: Masabi internal account ID (reversible to a user's email address)
          format: GENERIC_STRING
          example: AC2243SYQWN
        appId:
          type: string
          description: Unique identifier for the installation of the application
          format: GENERIC_STRING
          example: AP23P3SYQWL
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        channel:
          type: string
          description: The context in which this event was initiated
          format: GENERIC_STRING
          example: Mobile
        dayOfWeek:
          type: string
          description: "The human readable day of week (MONDAY, TUESDAY, etc). Values\
            \ for this scripted field are affected by the 'timezone' parameter, with\
            \ each time value being adjusted before being assigned a day. <br /> WARNING!\
            \ Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: WEDNESDAY
        deviceId:
          type: string
          description: OS-provided hardware identifier
          format: GENERIC_STRING
          example: K!CFF680C1-8E75-4209-B288-7E0A85649E2D
        deviceManufacturer:
          type: string
          description: Device manufacturer <br /> WARNING! Field is not indexed (see
            below)
          format: GENERIC_CASE_SENSITIVE_STRING
          example: Apple
        deviceModel:
          type: string
          description: The model of the device what sent the request
          format: GENERIC_CASE_SENSITIVE_STRING
          example: "iPhone7,1"
        deviceOS:
          type: string
          description: Device operating system <br /> WARNING! Field is not indexed
            (see below)
          format: GENERIC_CASE_SENSITIVE_STRING
          example: Android
        deviceParsedModel:
          type: string
          description: Device model <br /> WARNING! Field is not indexed (see below)
          format: GENERIC_CASE_SENSITIVE_STRING
          example: IPhone 8s
        eventId:
          type: string
          description: Internal unique id of this event<br /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: c9ebdd9d-95b0-4d8d-866c-9c580bf78917
        hourOfDay:
          type: number
          description: "The zero-indexed clock time hour (0-23). Values for this scripted\
            \ field are affected by the 'timezone' parameter, with each time value\
            \ being adjusted before being assigned an hour. <br /> WARNING! Field\
            \ is not indexed (see below)"
          format: INTEGER
          example: 3
        ingestTimestamp:
          type: number
          description: Timestamp recorded by the DS-Ingest node just before the insertion
            into data-store
          format: EPOCH_MILLIS
          example: 1534941901348
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        ipAddress:
          type: array
          items:
            type: string
            description: IP addresses that the user was connecting from
            format: IP_ADDRESS
            example: 192.168.0.1
        localFareDate:
          type: string
          description: "The local date of the event, allowing for agency-specific\
            \ post-midnight cutoff times."
          format: LOCAL_DATE
          example: 2018-08-20
        ownerId:
          type: string
          description: "Either accountId, appId, tokenId or purchaseId depending on\
            \ ownerType"
          format: GENERIC_STRING
          example: ABC1234
        ownerType:
          type: string
          description: "Denotes whether the document is associated with a account,\
            \ guest account or token<br /><br />ExpectedValues:<br />ACCOUNT: Customer\
            \ with full registered account<br />GUEST_ACCOUNT: Customer who have not\
            \ created an explicit account with us (app ID only)<br />TOKEN: Token\
            \ un-linked to an account<br />VENDOR_SALE: Owner disconnected from accounts\
            \ or tokens"
          format: GENERIC_STRING
          example: "[ACCOUNT, GUEST_ACCOUNT, TOKEN, VENDOR_SALE]"
        platform:
          type: string
          description: The OS details of the device that sent the request
          format: GENERIC_CASE_SENSITIVE_STRING
          example: iOS 5.1.1
        serverTimestamp:
          type: number
          description: Timestamp recorded by the Masabi server at the point of stats
            message emission<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
        versionNumber:
          type: string
          description: Version of the Justride application that connected
          format: GENERIC_STRING
          example: 1.01.04
      description: "Tracks account events such as logout, creating a new account,\
        \ etc."
    retail.activations:
      type: object
      properties:
        activeUses:
          type: number
          description: The number of simultaneous uses represented by this activation
            event; always 1 unless this is a multi-rider ticket.
          format: BYTE
          example: 127
        clientUsesRemaining:
          type: number
          description: Number of uses that the client claimed were remaining
          format: BYTE
          example: 127
        fareBlocks:
          type: object
          properties:
            ticket:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of this fare block in the brand config definition
                    format: GENERIC_STRING
                    example: "4"
                  name:
                    type: string
                    description: The human readable description of this Fare block
                      in the brand config definition
                    format: GENERIC_STRING
                    example: Park-n-Ride
                description: Expanded fare block objects on the ticket
          description: Expanded fare block objects based on definitions in brand config
        mediaChannel:
          type: string
          description: The media that barcode ended up being put on
          format: GENERIC_STRING
          example: PDF
        purchaseId:
          type: string
          description: Masabi-generated ID the purchase event associated with this
            activation
          format: GENERIC_STRING
          example: PUOGHTET2MQ7U2Y
        purchaseTimestamp:
          type: number
          description: Time that the ticket was purchased as Linux timestamp
          format: EPOCH_MILLIS
          example: 1534941901348
        riderTypeName:
          type: string
          description: The type of rider who can use this ticket
          format: GENERIC_STRING
          example: Adult
        serverAdjustedDeviceTimestamp:
          type: number
          description: Timestamp recorded on the local device clock at the point of
            action adjusted by the server if the device clock is ahead of the server
            clock
          format: EPOCH_MILLIS
          example: 1534941901348
        source:
          type: string
          description: How we found out about the activation
          format: GENERIC_STRING
          example: StartupSync
        transportModes:
          type: string
          description: ???
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        accountId:
          type: string
          description: Masabi internal account ID (reversible to a user's email address)
          format: GENERIC_STRING
          example: AC2243SYQWN
        appId:
          type: string
          description: Unique identifier for the installation of the application
          format: GENERIC_STRING
          example: AP23P3SYQWL
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        channel:
          type: string
          description: The context in which this event was initiated
          format: GENERIC_STRING
          example: Mobile
        dayOfWeek:
          type: string
          description: "The human readable day of week (MONDAY, TUESDAY, etc). Values\
            \ for this scripted field are affected by the 'timezone' parameter, with\
            \ each time value being adjusted before being assigned a day. <br /> WARNING!\
            \ Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: WEDNESDAY
        destination:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: The stations which the ticket holder is permitted to travel
            to
        deviceId:
          type: string
          description: OS-provided hardware identifier
          format: GENERIC_STRING
          example: K!CFF680C1-8E75-4209-B288-7E0A85649E2D
        deviceManufacturer:
          type: string
          description: Device manufacturer <br /> WARNING! Field is not indexed (see
            below)
          format: GENERIC_CASE_SENSITIVE_STRING
          example: Apple
        deviceModel:
          type: string
          description: The model of the device what sent the request
          format: GENERIC_CASE_SENSITIVE_STRING
          example: "iPhone7,1"
        deviceOS:
          type: string
          description: Device operating system <br /> WARNING! Field is not indexed
            (see below)
          format: GENERIC_CASE_SENSITIVE_STRING
          example: Android
        deviceParsedModel:
          type: string
          description: Device model <br /> WARNING! Field is not indexed (see below)
          format: GENERIC_CASE_SENSITIVE_STRING
          example: IPhone 8s
        deviceTimestamp:
          type: number
          description: Timestamp recorded on the local device clock at the point of
            action<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        eventId:
          type: string
          description: Internal unique id of this event<br /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: c9ebdd9d-95b0-4d8d-866c-9c580bf78917
        expiryTimestamp:
          type: number
          description: "Latest date/time that the ticket can be activated, as a Linux\
            \ timestamp"
          format: EPOCH_MILLIS
          example: 1534941901348
        hourOfDay:
          type: number
          description: "The zero-indexed clock time hour (0-23). Values for this scripted\
            \ field are affected by the 'timezone' parameter, with each time value\
            \ being adjusted before being assigned an hour. <br /> WARNING! Field\
            \ is not indexed (see below)"
          format: INTEGER
          example: 3
        ingestTimestamp:
          type: number
          description: Timestamp recorded by the DS-Ingest node just before the insertion
            into data-store
          format: EPOCH_MILLIS
          example: 1534941901348
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        ipAddress:
          type: array
          items:
            type: string
            description: IP addresses that the user was connecting from
            format: IP_ADDRESS
            example: 192.168.0.1
        issuingChannel:
          type: string
          description: The channel that the ticket was issued through.
          format: GENERIC_STRING
          example: MOBILE
        issuingPartner:
          type: string
          description: The ID of the partner organisation that the ticket was issued
            by or on behalf of.
          format: GENERIC_STRING
          example: CPP
        localFareDate:
          type: string
          description: "The local date of the event, allowing for agency-specific\
            \ post-midnight cutoff times."
          format: LOCAL_DATE
          example: 2018-08-20
        location:
          type: object
          properties:
            lat:
              type: number
              example: 41.12
            lon:
              type: number
              example: -71.34
          description: Most recent location reported by the GPS of the mobile device
            at the time of the event
        locationAccuracy:
          type: number
          description: "Accuracy of the location reported by the GPS on device, in\
            \ meters."
          format: DISTANCE
          example: 10.66
        locationTimestamp:
          type: number
          description: Timestamp of when the GPS on the device reported location (can
            be different from the timestamp of the event)
          format: EPOCH_MILLIS
          example: 1534941901348
        numOfPeople:
          type: number
          description: Number of people who can travel using one activation of this
            ticket
          format: INTEGER
          example: 2
        origin:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: The stations which the ticket holder is permitted to travel
            from
        ownerId:
          type: string
          description: "Either accountId, appId, tokenId or purchaseId depending on\
            \ ownerType"
          format: GENERIC_STRING
          example: ABC1234
        ownerType:
          type: string
          description: "Denotes whether the document is associated with a account,\
            \ guest account or token<br /><br />ExpectedValues:<br />ACCOUNT: Customer\
            \ with full registered account<br />GUEST_ACCOUNT: Customer who have not\
            \ created an explicit account with us (app ID only)<br />TOKEN: Token\
            \ un-linked to an account<br />VENDOR_SALE: Owner disconnected from accounts\
            \ or tokens"
          format: GENERIC_STRING
          example: "[ACCOUNT, GUEST_ACCOUNT, TOKEN, VENDOR_SALE]"
        platform:
          type: string
          description: The OS details of the device that sent the request
          format: GENERIC_CASE_SENSITIVE_STRING
          example: iOS 5.1.1
        productFareType:
          type: string
          description: "The fare type of the product selected at the time of purchase,\
            \ as defined in the tariff; if more than one product type was bought,\
            \ use 'Mixed'"
          format: GENERIC_STRING
          example: Round Trip
        productName:
          type: string
          description: "A meaningful product name to an agency user, eg 10-Ride or\
            \ Round Trip; if more than one product type was bought, use 'Mixed'"
          format: GENERIC_STRING
          example: Ten Ride
        productRef:
          type: string
          description: Agency specific unique identifier of the product actually purchased
            by the user - with composite tickets this may be different from the issued
            productId
          format: GENERIC_STRING
          example: "44040"
        reservedSeat:
          type: string
          description: The seat the ticket is reserved for
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        riderType:
          type: string
          description: The type ID of rider who can use this ticket
          format: GENERIC_STRING
          example: "1"
        serverTimestamp:
          type: number
          description: Timestamp recorded by the Masabi server at the point of stats
            message emission<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        serviceId:
          type: string
          description: The ID of the service the ticket is reserved for
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        subBrand:
          type: string
          description: (Optional) sub-brand in which the event was triggered.
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        tariffId:
          type: string
          description: Masabi tariff ID number - incremented each time the tariff
            is updated.
          format: GENERIC_STRING
          example: "2"
        ticketFareType:
          type: string
          description: "The fare type of the product against which this ticket was\
            \ issued, as defined in the tariff"
          format: GENERIC_STRING
          example: One Way
        ticketId:
          type: string
          description: Unique identifier for this mTicket
          format: GENERIC_STRING
          example: MT12343AC35
        ticketName:
          type: string
          description: "A meaningful product name to an agency user, eg Child"
          format: GENERIC_STRING
          example: Peak
        ticketRef:
          type: string
          description: Agency-specific unique identifier for the product against which
            this ticket was issued
          format: GENERIC_STRING
          example: "44010"
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
        versionNumber:
          type: string
          description: Version of the Justride application that connected
          format: GENERIC_STRING
          example: 1.01.04
      description: Tracks activation of mobile tickets.
    retail.ticket_purchases:
      type: object
      properties:
        auth:
          type: string
          description: ???
          format: GENERIC_STRING
          example: ???
        campaignId:
          type: string
          description: Identifier for the promotional campaign associated with this
            purchase
          format: GENERIC_STRING
          example: CAMPAIGN-123
        cardIndexInTransaction:
          type: number
          description: "Index of the card within the transaction - meaningless if\
            \ cardsInTransaction is 1; for a split transaction, this is 1 or 2"
          format: BYTE
          example: 1
        cardsInTransaction:
          type: number
          description: "Number of cards used for this purchase - 1 is normal, but\
            \ can be 2 for a split transaction"
          format: BYTE
          example: 1
        challenge:
          type: string
          description: ???
          format: GENERIC_STRING
          example: ???
        discountId:
          type: string
          description: Optional ID number of the rider's discount entitlement
          format: GENERIC_STRING
          example: AB1234567
        fees:
          type: number
          description: Any transaction fee charged for this purchase
          format: MONEY
          example: 2398.83
        fingerprint:
          type: string
          description: ???
          format: GENERIC_STRING
          example: ???
        initialNbProducts:
          type: number
          description: Initial number of product units before any promotional adjustments
          format: SHORT
          example: 2
        initialNbTickets:
          type: number
          description: Initial number of tickets before any promotional adjustments
          format: SHORT
          example: 20
        nbProducts:
          type: number
          description: "Number of units of products the user asked to purchase, so\
            \ 2 x '10 Ride' would be 2"
          format: SHORT
          example: 2
        nbTickets:
          type: number
          description: "Number of tickets created by the purchase, so 2 x '10 Ride'\
            \ would be 20"
          format: SHORT
          example: 20
        productRefs:
          type: string
          description: A comma-separated list of the agency-specific unique identifiers
            for the products purchased
          format: GENERIC_STRING
          example: "43010"
        promotionCodes:
          type: array
          items:
            type: string
            description: Promotion codes applied to this purchase
            format: GENERIC_STRING
            example: "PROMO2024,SUMMER10"
        pspTransactionReferences:
          type: array
          items:
            type: string
            description: "The references provided back to JustRide. Always set for\
              \ successful, optionally provided in failure cases depending on the\
              \ failure reason and the PSP"
            format: GENERIC_STRING
            example: "733087"
        riderTypeNames:
          type: array
          items:
            type: string
            description: List containing type of riders who can use this ticket
            format: GENERIC_STRING
            example: "Adult,Senior"
        salesAgent:
          type: string
          description: The agent (e.g. street seller or ticket window staff member)
            that issued the ticket
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        terminal:
          type: string
          description: ???
          format: GENERIC_STRING
          example: ???
        totalInitialPrice:
          type: number
          description: The total initial price before any promotional discounts were
            applied
          format: MONEY
          example: 20.0
        version3ds:
          type: string
          description: ???
          format: GENERIC_STRING
          example: ???
        accountId:
          type: string
          description: Masabi internal account ID (reversible to a user's email address)
          format: GENERIC_STRING
          example: AC2243SYQWN
        appId:
          type: string
          description: Unique identifier for the installation of the application
          format: GENERIC_STRING
          example: AP23P3SYQWL
        authorizationCode:
          type: string
          description: Authorisation code assigned by the PSP
          format: GENERIC_STRING
          example: "54321"
        bankAccountNumber:
          type: string
          description: The bank account reference of the customer following an iDEAL
            transaction
          format: GENERIC_STRING
          example: AB11INHO0001111112
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        cardCategory:
          type: string
          description: "Card's settlement type<br /><br />ExpectedValues:<br />credit:\
            \ Credit card (paid on account)<br />charge card: Charge card (paid on\
            \ account)<br />debit: Debit card (drains funds immediately)"
          format: GENERIC_STRING
          example: credit
        cardName:
          type: string
          description: Customer name as it appears on the card<br /><br />NotCreditCardNumber
          format: GENERIC_STRING
          example: T M Godber
        cardSequenceNumber:
          type: string
          description: Used to distinguish between primary card and associate cards
            when PANs are the same
          format: GENERIC_STRING
          example: "1"
        cardSignature:
          type: string
