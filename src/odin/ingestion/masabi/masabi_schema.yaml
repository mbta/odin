          type: number
          description: Vehicle position arrival timestamp from the avl feed.
          format: EPOCH_MILLIS
          example: 1534941901348
        vehiclePositionTimestamp:
          type: number
          description: Vehicle position timestamp from the avl feed.
          format: EPOCH_MILLIS
          example: 1534941901348
      description: Tracks status updates from validation devices in the field.
    payments.psp_interactions:
      type: object
      properties:
        auth:
          type: string
          description: "The outcome of any 3D-Secure processing.<br /><br />ExpectedValues:<br\
            \ />PASSED: 3D-Secure check was successful; the rider is verified as permitted\
            \ to use this card. This does not guarantee success of the payment as\
            \ there might still be funding issues.<br />FAILED: The rider could not\
            \ be verified as permitted to use this card. A FRAUD payment outcome is\
            \ expected in such a case."
          format: GENERIC_STRING
          example: PASSED
        bankAccountNumber:
          type: string
          description: The bank account reference of the customer following an iDEAL
            transaction
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        challenge:
          type: string
          description: "Details any 3D-Secure challenge interaction that was required\
            \ of the rider.<br /><br />ExpectedValues:<br />REQUESTED: The rider was\
            \ challenged via text message or required to log in.<br />PASSED: The\
            \ rider correctly entered the challenge code or password.<br />FAILED:\
            \ The rider did not enter the correct challenge code or password."
          format: GENERIC_STRING
          example: PASSED
        currencyCode:
          type: string
          description: The currency this transaction was conducted in (ISO4217)<br
            /><br />NotEmpty
          format: GENERIC_STRING
          example: USD
        customerId:
          type: string
          description: AppId or AccountId this interaction is associated with
          format: GENERIC_STRING
          example: WC5TBIP54AE
        deviceId:
          type: string
          description: OS-provided hardware identifier
          format: GENERIC_STRING
          example: DE55B42A-E58F-4271-9949-AA10A6C0FB7E
        fingerprint:
          type: string
          description: "Details any 3D-Secure processing that involved fingerprinting\
            \ the device used for the transaction.<br /><br />ExpectedValues:<br />REQUESTED:\
            \ A fingerprint of the device was taken to check if it is a device used\
            \ previously by this card-holder.<br />PASSED: The fingerprint of the\
            \ device confirmed that it is familiar to the card issuer.<br />FAILED:\
            \ The fingerprint of the device was not familiar to the card issuer."
          format: GENERIC_STRING
          example: REQUESTED
        fundingSource:
          type: string
          description: The source of the card used for the transaction
          format: GENERIC_STRING
          example: TOKENEX
        interactionType:
          type: string
          description: "Indicates the type of the request<br /><br />NotEmpty<br /><br\
            \ />ExpectedValues:<br />AUTHORIZE: The interaction with the PSP was to\
            \ authorise a payment.<br />CAPTURE: The interaction with the PSP was\
            \ to capture a payment that had previously been authorised.<br />VOID:\
            \ The interaction with the PSP was to void a previously authorised or\
            \ captured payment that had not yet settled.<br />REFUND: The interaction\
            \ with the PSP was to reverse a payment that had been settled.<br />PAYMENT:\
            \ The interaction with the PSP was to both authorise and capture a payment\
            \ in a single operation. This is deprecated behaviour."
          format: GENERIC_STRING
          example: CAPTURE
        merchantReference:
          type: string
          description: Reference for this transaction on this payment card<br /><br
            />NotEmpty
          format: GENERIC_STRING
          example: MRTY4N3RMZZ5AQC
        parentMerchantReference:
          type: string
          description: "Reference generated for the attempt preceding this. In the\
            \ case of a CAPTURE, it is the reference given during the AUTH request"
          format: GENERIC_STRING
          example: MRCRAFJYFQMFRQE
        pspTransactionReferences:
          type: array
          items:
            type: string
            description: "The references provided back to JustRide. Always set for\
              \ successful, optionally provided in failure cases depending on the\
              \ failure reason and the PSP"
            format: GENERIC_STRING
            example: AbCdEfGhIjKlMnOpQrS
        purchaseId:
          type: string
          description: Masabi-generated ID for the associated purchase event<br /><br
            />NotEmpty
          format: GENERIC_STRING
          example: PUOGHTET2MQ7U2Y
        successful:
          type: boolean
          description: Indicates whether MPG considered the request to be successful
          format: BOOLEAN
          example: true
        totalValue:
          type: number
          description: Total amount of the purchase that was on this card<br /><br
            />NotEmpty
          format: MONEY
          example: 7.75
        version:
          type: string
          description: MPG version used for the transaction
          format: GENERIC_STRING
          example: 2.51.73
        version3ds:
          type: string
          description: "Indicates which version, if any, of 3D-Secure processing,\
            \ was offered for this transaction. v1 is the requirement for the user\
            \ to enter a password known to their bank. v2 is the requirement for the\
            \ user to receive a text message and enter a code."
          format: GENERIC_STRING
          example: "2"
        authorizationCode:
          type: string
          description: Authorisation code assigned by the PSP
          format: GENERIC_STRING
          example: "54321"
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        cardCategory:
          type: string
          description: "Card's settlement type<br /><br />ExpectedValues:<br />credit:\
            \ Credit card (paid on account)<br />charge card: Charge card (paid on\
            \ account)<br />debit: Debit card (drains funds immediately)"
          format: GENERIC_STRING
          example: credit
        cardName:
          type: string
          description: Customer name as it appears on the card<br /><br />NotCreditCardNumber
          format: GENERIC_STRING
          example: T M Godber
        cardSequenceNumber:
          type: string
          description: Used to distinguish between primary card and associate cards
            when PANs are the same
          format: GENERIC_STRING
          example: "1"
