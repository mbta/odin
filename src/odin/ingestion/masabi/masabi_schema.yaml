            \ un-linked to an account<br />VENDOR_SALE: Owner disconnected from accounts\
            \ or tokens"
          format: GENERIC_STRING
          example: "[ACCOUNT, GUEST_ACCOUNT, TOKEN, VENDOR_SALE]"
        panFirstSix:
          type: string
          description: First 6 digits of PAN
          format: GENERIC_STRING
          example: "1234"
        panLastFour:
          type: string
          description: Last 4 digits of PAN
          format: GENERIC_STRING
          example: "1234"
        paymentAccountReference:
          type: string
          description: The underlying account that funds potentially multiple cards
          format: GENERIC_STRING
          example: "1234567890123456"
        processingPsp:
          type: string
          description: The name of the PSP who handled the transaction
          format: GENERIC_STRING
          example: Vantiv
        serverTimestamp:
          type: number
          description: Timestamp recorded by the Masabi server at the point of stats
            message emission<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        subBrand:
          type: string
          description: (Optional) sub-brand in which the event was triggered.
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
      description: Refunds provided for contactless-EMV payments taken in error
    audit.hub_action_log:
      type: object
      properties:
        action:
          type: string
          description: "Type of the action taken<br /><br />ExpectedValues:<br />ACCOUNT_TOKEN_ASSOCIATION:\
            \ Link an anonymous token with an existing customer account. (Associated\
            \ with the account page => customerId is the accountId).<br />UPDATE_USER_METADATA:\
            \ Create / update / delete additional data related to a Hub User or Machine\
            \ Login.  Currently used for barcode configurations only.<br />USER_SEARCH:\
            \ Search Hub Users / Machine Logins by username.<br />BULK_CANCEL_TICKETS:\
            \ Used for cancelling a batch of printable tickets for a given icn range.<br\
            \ />CS_SEARCH: Search functionality that works by either account number,\
            \ token, name, icn.<br />TARIFF_LIVE: Tariff has been promoted to LIVE\
            \ and is now in use.<br />BULK_ISSUE_COMPLIMENTARY_TICKETS: Issue a batch\
            \ of complimentary tickets for specified customer accounts.<br />ANONYMOUS_TOKEN_ASSOCIATION:\
            \ Link an anonymous token with an existing customer account. (Associated\
            \ with the token page => customerId is the tokenId).<br />SEND_SVA_TOPUP_RECEIPT:\
            \ IResend an receipt for an SVA credit purchase from the Hub.<br />CREATE_USER:\
            \ Create a Hub User or Machine Login.<br />ISSUE_PARTNER_TICKETS: Issue\
            \ a batch of mobile partner tickets.<br />EXPORT_USERS: Export existing\
            \ Hub Users / Machine Logins as a CSV file.<br />USER_BULK_UPLOAD: Bulk\
            \ created Hub users by uploading a batch of accounts/credentials.<br />DATAMART_QUERY:\
            \ Records whenever an authorised user makes a direct DataMart API request\
            \ and downloads rows.<br />DATA_MART_EXTRACT: Download data from the Hub's\
            \ Data Extracts page.<br />ISSUE_COMPLIMENTARY_PRINTABLE_TICKETS: Issue\
            \ a free, anonymous printable ticket through the Hub.<br />SELL_TICKETS:\
            \ Complete a ticket(s) purchase via Vendor Portal.<br />ADD_DEVICE_SWITCH_CREDIT:\
            \ Issue device switch credit (Used by riders to switch their account from\
            \ one phone to another).<br />BULK_TOKEN_USABILITY_CHANGE: Bulk block/unblock\
            \ ABT tokens.<br />SUSPEND_PARTNER: Suspend a partner via Hub - all Hub\
            \ user accounts associated with this partner are also suspended.<br />BULK_ADD_ENTITLEMENTS:\
            \ Add an entitlement to multiple rider accounts (unlinked smart cards\
            \ not supported).<br />MIGRATE_IN: Tickets are migrated into one Justride\
            \ account, paired with MIGRATE_OUT.<br />CREATE_USER_ENTITLEMENT: Add\
            \ an entitlement to a single rider account or an unlinked smart card.<br\
            \ />SUSPEND_USER: Deactivate a user from the hub, preventing them from\
            \ logging in.<br />TARIFF_UPLOADED: New tariff uploaded successfully.<br\
            \ />CANCEL_VENDOR_TICKETS: Cancel one or more anonymous printable tickets\
            \ by eTicketNumber.<br />SVA_TOPUP_PURCHASE: Purchase SVA credit via Vendor\
            \ Portal.<br />CANCEL: Cancel one or more mobile tickets by eTicketNumber.<br\
            \ />Download Report: Download a CSV or XLSX report from the Reports tab\
            \ in the Hub.<br />BULK_ADD_TOKENS: Add a batch of ABT tokens.<br />TOKEN_SEARCH:\
            \ Search for a token by token id, icn, uid or retail network ID in the\
            \ Smart Cards section of the Hub.<br />BULK_ADD_USERS: Create a batch\
            \ of Hub users.<br />SEARCH: Search for a rider account in the Hub (legacy\
            \ search).<br />SEND_RECEIPT: Resend an receipt for a ticket(s) purchase\
            \ from the Hub.<br />DOWNLOAD_REPORT: Download a CSV or XLSX report from\
            \ the Reports tab in the Hub.<br />DISABLE_MONITORING: Pattern: Add all\
            \ actors associated with this customer to the allow-list to prevent blocking,\
            \ etc.<br />ENROLL_ACCOUNT_WITH_MOBILE_BARCODE: Issue a mobile ABT barcode\
            \ to an account.<br />MIGRATE_OUT: Tickets are migrated from one account,\
            \ paired with MIGRATE_IN.<br />REACTIVATE_USER: Reactivate a user from\
            \ the hub, allowing them to log in again.<br />UPDATE_USER_ENTITLEMENT:\
            \ Update an existing entitlement associated with a rider account or an\
            \ unlinked smart card.<br />TARIFF_DELETED: Selected tariff has been removed.<br\
            \ />BLOCK: Block rider's account, app or device (actionLevel in the details\
            \ section specifies which one).<br />SVA_REIMBURSEMENT: Reimburse the\
            \ SVA credit to the original payment method used to top-up.<br />TOKEN_CREATION:\
            \ Add a new smart card via Hub.<br />ENABLE_MONITORING: Pattern: Remove\
            \ all actors associated with this customer from the allow-list. This means\
            \ they can be auto-blocked again if configured.<br />SEND_FORGOTTEN_PASSWORD_EMAIL:\
            \ Send an email to reset the password for a Justride account.<br />ISSUE_COMPLIMENTARY_TICKETS:\
            \ Issue one or more complimentary tickets to a specific rider.<br />SVA_TOPUP_COMPLIMENTARY:\
            \ Add balance to an SVA without requiring payment.<br />SVA_BULK_TOP_UP:\
            \ Add balance to an SVA through bulk top up action.<br />TOKEN_USABILITY_CHANGE:\
            \ Block/unblock an ABT token.<br />END_VENDOR_PORTAL_SESSION: End current\
            \ Vendor Portal session.<br />USER_LOGIN: Records a Hub User logging in\
            \ using username & password.<br />SSO_USER_LOGIN: Records a Hub User logging\
            \ in using an external identity provider.<br />TARIFF_DRAFT: Set an existing\
            \ tariff to a DRAFT state (product not visible to riders).<br />CHANGE_PASSWORD:\
            \ A hub user changing their password.<br />REACTIVATE: Reactivate one\
            \ or more previously cancelled mobile tickets by eTicketNumber.<br />RESEND_ACCOUNT_VERIFICATION_EMAIL:\
            \ Resend the account verification email for a rider account.<br />UPDATE_USER:\
            \ Update details of an existing Hub User / Machine Login (e.g. role, name,\
            \ partner).<br />TARIFF_SWAP: Make a DRAFT tariff LIVE and a LIVE tariff\
            \ DRAFT in a single atomic operation.<br />TOKEN_STATE_CHANGE: Block/unblock\
            \ an ABT token (legacy).<br />DOWNLOAD_PRINTABLE_TICKETS: Download anonymous\
            \ printable tickets (QR Codes).<br />REFUND: Refund a mobile ticket on\
            \ a customer account.<br />SVA_DEDUCTION: Deduct credit from an SVA balance.<br\
            \ />CREATE_PARTNER: Create a new partner.<br />INCREASE_PURSE_BALANCE:\
            \ Add complimentary SVA credit (legacy).<br />ADJUST_RIDER_LIMIT: Adjust\
            \ the number of available tickets for products with a rider limit.<br\
            \ />BULK_REFUND: Issue refunds in bulk for given accounts and associated\
            \ purchases for mobile tickets only.<br />UNBLOCK: Unblock rider's account,\
            \ app or device (actionLevel in the details section specifies which one).<br\
            \ />CANCEL_VENDOR_SALE: Cancel a group of anonymous printable tickets\
            \ by sale reference number.<br />BULK_DEACTIVATE_ENTITLEMENTS: Deactivate\
            \ an existing entitlement for multiple rider accounts (unlinked smart\
            \ cards not supported).<br />ADD_NOTE: Adds a free-text note to this customer's\
            \ account page, future Hub users will be able to read attached notes.<br\
            \ />BULK_ISSUE_PARTNER_TICKETS: Issue a batch of mobile partner tickets.<br\
            \ />CANCEL_PRINTABLE_TICKET: Cancel a single anonymous printable ticket\
            \ by ICN (as a result of a Bulk Cancel request).<br />BULK_CANCEL_PRINTABLE_TICKETS:\
            \ Cancel multiple anonymous printable tickets by ICN (umbrella stats message\
            \ for CANCEL_PRINTABLE_TICKET).<br />BULK_REFUND_ASSIGNED_TICKETS: Refund\
            \ multiple mobile tickets.<br />REACTIVATE_PARTNER: Reactivate a partner\
            \ via Hub.<br />ACCOUNT_TOKEN_UNLINK: Unlink an associated token from\
            \ a customer account. (Associated with the account page => customerId\
            \ is the accountId).<br />ASSOCIATED_TOKEN_UNLINK: Unlink an associated\
            \ token from a customer account. (Associated with the token page => customerId\
            \ is the tokenId).<br />TOKEN_LABEL_CHANGE: Update a name given to a token\
            \ linked to a customer account.<br />REFUND_CEMV_CHARGE: Refund a CEMV\
            \ charge.<br />BULK_REFUND_CEMV_CHARGE: Refund multiple CEMV charges.<br\
            \ />CEMV_CHARGE_DEBT_RECOVERY: Recover a CEMV debt.<br />DOWNLOAD_VENDOR_PORTAL_SESSION_REPORT:\
            \ Download a report with detailed ticket sales and smartcard topups from\
            \ a Vendor Portal session.<br />UPDATE_PARTNER: Update a partner’s details.<br\
            \ />BULK_CREATE_PARTNER: Create multiple partners.<br />PARTNER_DISSOCIATION:\
            \ Partner association removed.<br />BULK_SVA_TOPUP_COMPLIMENTARY: Top\
            \ up multiple SVAs.<br />CREATE_ACCOUNT: Create a customer account via\
            \ Hub.<br />BULK_CREATE_ACCOUNT: Bulk create customer accounts via Hub.<br\
            \ />UPDATE_TOKEN_MOBILITY_SERVICE: Update the mobility service of a token.<br\
            \ />BULK_UPDATE_TOKEN_MOBILITY_SERVICE_ASSOCIATIONS: Update the mobility\
            \ service of tokens in bulk.<br />UPDATE_TOKEN_MOBILITY_PROVIDER: Update\
            \ the mobility provider of a token.<br />BULK_UPDATE_TOKEN_MOBILITY_PROVIDER_ASSOCIATIONS:\
            \ Update the mobility providers of tokens in bulk.<br />TOKEN_HIERARCHY_CHANGE:\
            \ Change the hierarchy of a token.<br />CREATE_APP_BANNER: Create an in-app\
            \ banner message.<br />EDIT_APP_BANNER: Edit an in-app banner message.<br\
            \ />CANCEL_APP_BANNER: Cancel an in-app banner message.<br />ISSUE_COMPLIMENTARY_PASSES:\
            \ Issue a complimentary pass to a specific rider.<br />SELL_PASSES: Complete\
            \ a pass purchase via Vendor Portal<br />CANCEL_PASSES: Cancel a complimentary\
            \ pass.<br />REFUND_PASSES: Refund a pass.<br />CREATE_APP_NOTIFICATION:\
            \ Create an app notification.<br />EDIT_APP_NOTIFICATION: Edit an app\
            \ notification.<br />CANCEL_APP_NOTIFICATION: Cancel an app notification."
          format: GENERIC_STRING
          example: REFUND
        bulkJobId:
          type: string
          description: Unique id of the bulk job (if applicable)
          format: GENERIC_STRING
          example: ac96c94f-5688-40dc-a9f5-c35f92ce1e60
        customerId:
          type: string
          description: The App or Account ID which the action affected (if applicable)
          format: GENERIC_STRING
          example: AC2243SYQWN
        customerNoteText:
          type: string
          description: Free-text note added to the customer
          format: SEARCHABLE_GENERIC_TEXT
          example: Customer called to have expired tickets refunded
        details:
          type: object
          description: JSON containing additional details about the action (action-specific)
        itemsAffected:
          type: number
          description: The number of items (e.g. tickets) that were affected by the
            action
          format: SHORT
          example: 2
        logId:
          type: string
          description: Application-generated UUID of the log event<br /><br />NotEmpty
          format: GENERIC_STRING
          example: c9ebdd9d-95b0-4d8d-866c-9c580bf78917
        module:
          type: string
          description: The name of the BE service that sent the message
          format: GENERIC_STRING
          example: CS
        partner:
          type: string
          description: ID of the partner organization the employee who triggered the
            action belongs to (if applicable)
          format: GENERIC_STRING
          example: UCL
        result:
          type: string
          description: "Enum indicating whether the action was successful or not <br\
            \ /><br />ExpectedValues:<br />SUCCESS: Action completed without error.<br\
            \ />ERROR: Action encountered an error and may not have been completed."
          format: GENERIC_STRING
          example: SUCCESS
        role:
          type: string
          description: Auth role assigned to the employee who triggered the action
          format: GENERIC_STRING
          example: CustomerServiceManager
        targetUsernames:
          type: array
          items:
            type: string
            description: Users names against which action has been taken
            format: GENERIC_STRING
            example: justin.ride@masabi.com
        tokenUuid:
          type: string
          description: Unique id of the auth token used to trigger the action
          format: GENERIC_STRING
          example: eb0ff369-a111-4292-9572-34e596912e54
        username:
          type: string
          description: The username (email) of the agency (or agency partner) employee
            who triggered the action
          format: GENERIC_STRING
          example: justin.ride@masabi.com
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        dayOfWeek:
          type: string
          description: "The human readable day of week (MONDAY, TUESDAY, etc). Values\
            \ for this scripted field are affected by the 'timezone' parameter, with\
            \ each time value being adjusted before being assigned a day. <br /> WARNING!\
            \ Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: WEDNESDAY
        hourOfDay:
          type: number
          description: "The zero-indexed clock time hour (0-23). Values for this scripted\
            \ field are affected by the 'timezone' parameter, with each time value\
            \ being adjusted before being assigned an hour. <br /> WARNING! Field\
            \ is not indexed (see below)"
          format: INTEGER
          example: 3
        ingestTimestamp:
          type: number
          description: Timestamp recorded by the DS-Ingest node just before the insertion
            into data-store
          format: EPOCH_MILLIS
          example: 1534941901348
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        localFareDate:
          type: string
          description: "The local date of the event, allowing for agency-specific\
            \ post-midnight cutoff times."
          format: LOCAL_DATE
          example: 2018-08-20
        serverTimestamp:
          type: number
          description: Timestamp recorded by the Masabi server at the point of stats
            message emission<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        subBrand:
          type: string
          description: (Optional) sub-brand in which the event was triggered.
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
      description: Stores details of actions taken by Hub users
    pattern.signals:
      type: object
      properties:
        matchedEvents:
          type: array
          items:
            type: object
            description: An ordered array of Data Store events that form the sequence
              matching this signal. <br /> WARNING! Field is not indexed (see below)
        metadata:
          type: object
          description: Contains additional details about the signal <br /> WARNING!
            Field is not indexed (see below)
        primaryActorId:
          type: string
          description: The ID of the actor that this pattern was primarily associated
            with
          format: GENERIC_STRING
          example: WC437879194
        primaryActorType:
          type: string
          description: "The type of actor that this pattern was primarily associated\
            \ with<br /><br />ExpectedValues:<br />USERNAME: Asset Management only:\
            \ the username currently logged into a validator.<br />TICKET: A ticket\
            \ issued by Justride, actorId equal to ticketId.<br />ACCOUNT: Full registered\
            \ account, actorId equal to accountId.<br />DEVICE: actorId equal to the\
            \ OS-provided device identifier, unique across OS installations.<br />APP:\
            \ App Installation, actorId equal to appId.<br />PAYMENT_CARD: Approximate\
            \ signature of a payment card. actorId is panFirstSix+panLastFour+zipCode.<br\
            \ />USER: actorId is either an accountId or appId, used in patterns where\
            \ it cannot be determined which.<br />BRAND: Internal only.<br />SVA:\
            \ actorId equal to svaId, a stored value account managed by Justride."
          format: GENERIC_STRING
          example: ACCOUNT
        secondaryActors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: "A secondary ID associated with the pattern, but not\
                  \ the primary keying ID"
                format: GENERIC_STRING
                example: WC437879194
            description: "An array of actors that were associated with this signal,\
              \ but were not the main key"
        thresholds:
          type: array
          items:
            type: object
            description: "An array of threshold objects, defining which were configured\
              \ and what the recorded values wereat the time of the signal detection\
              \ <br /> WARNING! Field is not indexed (see below)"
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        category:
          type: string
          description: "The higher level grouping that this signal detector operates\
            \ in<br /><br />ExpectedValues:<br />FRAUD: Patterns related to fraudulent\
            \ behaviour by riders.<br />PLATFORM_MONITORING: Patterns related to the\
            \ health of the JustRide platform at large."
          format: GENERIC_STRING
          example: FRAUD
        dayOfWeek:
          type: string
          description: "The human readable day of week (MONDAY, TUESDAY, etc). Values\
            \ for this scripted field are affected by the 'timezone' parameter, with\
            \ each time value being adjusted before being assigned a day. <br /> WARNING!\
            \ Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: WEDNESDAY
        detectedTimestamp:
          type: number
          description: Timestamp recorded by Pattern Detector of the wall-time at
            the point of detection
          format: EPOCH_MILLIS
          example: 1534941901348
        hourOfDay:
          type: number
          description: "The zero-indexed clock time hour (0-23). Values for this scripted\
            \ field are affected by the 'timezone' parameter, with each time value\
            \ being adjusted before being assigned an hour. <br /> WARNING! Field\
            \ is not indexed (see below)"
          format: INTEGER
          example: 3
        ingestTimestamp:
          type: number
          description: Timestamp recorded by the DS-Ingest node just before the insertion
            into data-store
          format: EPOCH_MILLIS
          example: 1534941901348
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        localFareDate:
          type: string
          description: "The local date of the event, allowing for agency-specific\
            \ post-midnight cutoff times."
          format: LOCAL_DATE
          example: 2018-08-20
        serverTimestamp:
          type: number
          description: Timestamp recorded by the Masabi server at the point of stats
            message emission<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        severity:
          type: string
          description: "The severity label for the configuration that matched this\
            \ behaviour<br /><br />ExpectedValues:<br />LOW: Low Severity.<br />MEDIUM:\
            \ Medium Severity.<br />HIGH: High Severity."
          format: GENERIC_STRING
          example: LOW
        signalId:
          type: string
          description: UUID generated by Pattern Detector at the time of signal detection<br
            /><br />NotEmpty
          format: GENERIC_STRING
          example: 1ff08290-32ca-48c2-8ae9-0d6f40a41612
        signalType:
          type: string
          description: "The type of the signal detector that matched this behaviour<br\
            \ /><br />ExpectedValues:<br />RepeatedInspectionInducedCompliance: Detects\
            \ riders failing to activate or purchase tickets prior to boarding.<br\
            \ />AccountsPerDevice: Detects large number of Justride accounts being\
            \ used on one phone.<br />CardsPerDevice: Detects large number of payment\
            \ cards being used on one phone.<br />CardsPerAccount: Experimental/Unstable:\
            \ Detects large number of payment cards being used on one account.<br\
            \ />DevicesPerCard: Fuzzy detection of many different phones using the\
            \ same payment card.<br />AVSTesting: Detects riders attempting to guess\
            \ zipCode values for payment cards.<br />HighTransactionValueOnDevice:\
            \ Detects suspiciously large transactions.<br />EntitlementIdsPerDevice:\
            \ Detects riders attempting to guess entitlement IDs.<br />ScansPerTicket:\
            \ Detects the same ticket being scanned too many times.<br />AbandonedPurchases:\
            \ Detects behaviour consistent with 'account selling'.<br />HighValueTopUpsOnSva:\
            \ Detects suspiciously large SVA top-ups.<br />TokenLinkingAttemptsPerAccount:\
            \ Detects riders attempting to guess token IDs for linking.<br />ValidationDeviceStatusChange:\
            \ Deprecated: Records health status changes of Validators.<br />PurchaseOnInspection:\
            \ Deprecated: Replaced by RepeatedInspectionInducedCompliance.<br />RepeatedPurchaseOnInspection:\
            \ Deprecated: Replaced by RepeatedInspectionInducedCompliance.<br />PurchaseFailureRate:\
            \ Deprecated, Internal Only.<br />ActiveAccountsPerDevice: Deprecated.<br\
            \ />TokensPerAccount: Deprecated: Replaced by TokenLinkingAttemptsPerAccount.<br\
            \ />InspectionInducedCompliance: Deprecated: Replaced by RepeatedInspectionInducedCompliance."
          format: GENERIC_STRING
          example: CardsPerDevice
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
            this event.
          format: GENERIC_STRING
          example: America/Los_Angeles
      description: "A signal from pattern is a sequence of Justride events that matched\
        \ one of the configured behaviours in Pattern Detector. This might be a fraud\
        \ issue or a platform monitoring issue, etc."
    pattern.consequences:
