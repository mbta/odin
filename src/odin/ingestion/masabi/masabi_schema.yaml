        signalType:
          type: string
          description: "The type of the signal detector that matched this behaviour<br\
            \ /><br />ExpectedValues:<br />RepeatedInspectionInducedCompliance: Detects\
            \ riders failing to activate or purchase tickets prior to boarding.<br\
            \ />AccountsPerDevice: Detects large number of Justride accounts being\
            \ used on one phone.<br />CardsPerDevice: Detects large number of payment\
            \ cards being used on one phone.<br />CardsPerAccount: Experimental/Unstable:\
            \ Detects large number of payment cards being used on one account.<br\
            \ />DevicesPerCard: Fuzzy detection of many different phones using the\
            \ same payment card.<br />AVSTesting: Detects riders attempting to guess\
            \ zipCode values for payment cards.<br />HighTransactionValueOnDevice:\
            \ Detects suspiciously large transactions.<br />EntitlementIdsPerDevice:\
            \ Detects riders attempting to guess entitlement IDs.<br />ScansPerTicket:\
            \ Detects the same ticket being scanned too many times.<br />AbandonedPurchases:\
            \ Detects behaviour consistent with 'account selling'.<br />HighValueTopUpsOnSva:\
            \ Detects suspiciously large SVA top-ups.<br />TokenLinkingAttemptsPerAccount:\
            \ Detects riders attempting to guess token IDs for linking.<br />ValidationDeviceStatusChange:\
            \ Deprecated: Records health status changes of Validators.<br />PurchaseOnInspection:\
            \ Deprecated: Replaced by RepeatedInspectionInducedCompliance.<br />RepeatedPurchaseOnInspection:\
            \ Deprecated: Replaced by RepeatedInspectionInducedCompliance.<br />PurchaseFailureRate:\
            \ Deprecated, Internal Only.<br />ActiveAccountsPerDevice: Deprecated.<br\
            \ />TokensPerAccount: Deprecated: Replaced by TokenLinkingAttemptsPerAccount.<br\
            \ />InspectionInducedCompliance: Deprecated: Replaced by RepeatedInspectionInducedCompliance."
          format: GENERIC_STRING
          example: CardsPerDevice
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
