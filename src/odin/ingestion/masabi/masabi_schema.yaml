              example: 15432
            startupTime:
              type: number
              description: Time taken for inspector to start in milliseconds
              format: LONG
              example: 30987
          description: All telemetry data specific to the inspector application
        ipAddress:
          type: string
          description: The IP address assigned to this validator
          format: IP_ADDRESS
          example: 192.168.0.1
        kernel:
          type: object
          properties:
            startupTime:
