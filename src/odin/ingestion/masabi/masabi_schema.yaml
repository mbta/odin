                  event was created
                format: GENERIC_STRING
                example: AbCdEfGhIjKlMnOpQrS
            description: All the ServiceState instances that were reported for this
              event
        stackVersion:
          type: string
          description: "The version of the stack (all apps, hardware/Linux configs)\
            \ running whilst this event was sent"
          format: GENERIC_STRING
          example: rocko-103
        system:
          type: object
          properties:
            startupTime:
              type: number
              description: Time taken for the validator to boot into a state where
                it can scan tickets in milliseconds
              format: LONG
              example: 45678
          description: All telemetry data specific to system / OS
        temperature:
          type: number
          description: Temperature of the device in degrees Celsius
          format: INTEGER
          example: 1232324
        timestampOfMostRecentScan:
          type: number
          description: The receivedTimestamp of the most recent scan record that this
            device downloaded from TVD
          format: EPOCH_MILLIS
          example: 1534941901348
        appVersion:
          type: string
          description: Version of Inspect app that interacted
          format: GENERIC_STRING
          example: 1.00.21
        brand:
          type: string
          description: The brand in which the event was triggered<br /><br />NotEmpty
          format: GENERIC_STRING
          example: JustRideUniversal
        dayOfWeek:
          type: string
          description: "The human readable day of week (MONDAY, TUESDAY, etc). Values\
            \ for this scripted field are affected by the 'timezone' parameter, with\
            \ each time value being adjusted before being assigned a day. <br /> WARNING!\
            \ Field is not indexed (see below)"
          format: GENERIC_CASE_SENSITIVE_STRING
          example: WEDNESDAY
        decorationTimestamp:
          type: number
          description: Decoration timestamp from the avl decorator.
          format: EPOCH_MILLIS
          example: 1534941901348
        deviceLocation:
          type: object
          properties:
            lat:
              type: number
              example: 41.12
            lon:
              type: number
              example: -71.34
          description: Device location provided by on-board GPS module for a server
            side AVL enabled brand
        deviceModel:
          type: string
          description: A description of the asset 'model' in a readable format
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        deviceTimestamp:
          type: number
          description: Timestamp recorded on the local device clock at the point of
            action<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        deviceType:
          type: string
          description: "A number indicating the type of device used.<br /><br />ExpectedValues:<br\
            \ />0: Gate<br />1: Non-gate fixed validator (i.e. validator on a vehicle)<br\
            \ />2: Passenger action<br />3: Handheld device<br />4: Revenue Protection\
            \ Office<br />5: RPO Inspector<br />6: British Transport Police<br />7:\
            \ Ticket office<br />8: TVD<br />9: Customer services<br />10: Ticket\
            \ retailer<br />11: Other"
          format: GENERIC_STRING
          example: "3"
        hourOfDay:
          type: number
          description: "The zero-indexed clock time hour (0-23). Values for this scripted\
            \ field are affected by the 'timezone' parameter, with each time value\
            \ being adjusted before being assigned an hour. <br /> WARNING! Field\
            \ is not indexed (see below)"
          format: INTEGER
          example: 3
        ingestTimestamp:
          type: number
          description: Timestamp recorded by the DS-Ingest node just before the insertion
            into data-store
          format: EPOCH_MILLIS
          example: 1534941901348
        ingestUid:
          type: string
          description: Unique identifier of the document (copy of the ES '_id' field)<br
            /><br />NotEmpty
          format: GENERIC_CASE_SENSITIVE_STRING
          example: ABCdf12356
        localFareDate:
          type: string
          description: "The local date of the event, allowing for agency-specific\
            \ post-midnight cutoff times."
          format: LOCAL_DATE
          example: 2018-08-20
        location:
          type: object
          properties:
            lat:
              type: number
              example: 41.12
            lon:
              type: number
              example: -71.34
          description: Device location provided by Server Side AVL if enabled in the
            brand otherwise provided by on-board GPS module
        platformName:
          type: string
          description: The platform of the asset that sent the request
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        routeId:
          type: string
          description: AVL field - identifies the route vehicle is on at the time
            of the event
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        routeIdSource:
          type: string
          description: "AVL field - indicate from which source routeId is coming from<br\
            \ /><br />ExpectedValues:<br />GTFS_RT: GTFS Realtime feed<br />GTFS_STATIC:\
            \ GTFS static feed<br />GTFS_NONE: No GTFS feed available"
          format: GENERIC_STRING
          example: GTFS_RT
        routeName:
          type: string
          description: AVL field - identifies the route vehicle is on at the time
            of the event
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        scannedAt:
          type: object
          properties:
            externalId:
              type: string
              description: The agency ID for the station
              format: GENERIC_STRING
              example: GRN
            internalId:
              type: string
              description: The internal Masabi ID for the station
              format: GENERIC_CASE_SENSITIVE_STRING
              example: "744"
            lineIds:
              type: array
              items:
                type: string
                description: The line IDs for the station
                format: GENERIC_STRING
                example: "[ \"2\", \"6\" ]"
            name:
              type: string
              description: The name of the station
              format: GENERIC_STRING
              example: Green Hills
            zoneIds:
              type: array
              items:
                type: string
                description: Zone the station is in
                format: GENERIC_STRING
                example: "45"
          description: Station that ticket was scanned at to trigger this simulated
            telemetry
        seenByServerSideAvlDecorator:
          type: boolean
          description: Indicates whether this record was routed via avl decorator
            or no
          format: BOOLEAN
          example: true
        serverTimestamp:
          type: number
          description: Timestamp recorded by the Masabi server at the point of stats
            message emission<br /><br />NotEmpty
          format: EPOCH_MILLIS
          example: 1534941901348
        subBrand:
          type: string
          description: (Optional) sub-brand in which the event was triggered.
          format: GENERIC_STRING
          example: AbCdEfGhIjKlMnOpQrS
        tableName:
          type: string
          description: "The table name, similar to index name but not versioned and\
            \ immutable<br /><br />NotEmpty"
          format: TABLE_NAME
          example: retail.ticket_purchases
        timezone:
          type: string
          description: The IANA standard representation of the brand timezone for
