            \ />1000: Contactless Card Generic<br />1100: MIFARE Card Generic<br />1101:\
            \ MIFARE Classic 1K<br />1102: MIFARE Classic 4K<br />1103: MIFARE DESFire\
            \ EV1<br />1104: MIFARE DESFire EV2<br />1106: MIFARE DESFire EV3<br />1105:\
            \ MIFARE Ultralight<br />2000: Contactless EMV Card Generic<br />2110:\
            \ Contactless Mastercard with Unknown form factor<br />2120: Contactless\
